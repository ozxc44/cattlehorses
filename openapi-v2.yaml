                    type: object
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Changeset not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Changeset is not approved, is closed, has conflicts, or is blocked by branch protection rules (required approvals, required status checks, or local merge queue ordering).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

