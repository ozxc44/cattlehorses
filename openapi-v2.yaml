  /v1/projects/{project_id}/changesets/{changeset_id}/merge-queue:
    parameters:
      - $ref: "#/components/parameters/PidPath"
      - $ref: "#/components/parameters/ProjectChangesetIdPath"
    post:
      operationId: enqueueProjectChangesetMergeQueue
      tags: [Versioning]
      summary: Add an approved changeset to the local merge queue.
      description: |
        Owner/admin or the changeset creator can add an approved open
        changeset to the branch-local merge queue. The endpoint is idempotent
        for an already queued changeset. This is a local ordering gate only;
        no external runner, auto-rebase, or auto-merge is connected.
      responses:
        "200":
          description: Changeset queued or already queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectChangeset"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Changeset not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Changeset is closed, not approved, or otherwise cannot be queued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: dequeueProjectChangesetMergeQueue
      tags: [Versioning]
      summary: Remove a changeset from the local merge queue.
      description: |
        Owner/admin or the changeset creator can remove an open queued
        changeset. Remaining queued changesets on the same branch are compacted
        to keep queue positions contiguous.
      responses:
        "200":
          description: Changeset removed from queue or already unqueued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectChangeset"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Changeset not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Changeset is closed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{project_id}/changesets/{changeset_id}/merge:
    parameters:
