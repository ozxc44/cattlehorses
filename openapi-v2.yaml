webhooks:
  runtimeAgentInvoke:
    post:
      operationId: invokeRegisteredAgentRuntime
      tags: [Runtime]
      summary: Invoke a registered agent through Runtime Adapter V1.
      description: |
        Outbound contract used by the platform when dispatching a queued agent
        run to an agent's registered `endpoint_url`. This is not a platform REST
        endpoint under `/v1`; it documents the HTTP request a registered agent
        must accept.

        The request content type is `application/json`. `X-ZZ-Signature` is
        computed from the raw JSON body and the agent's stored invoke secret.
      parameters:
        - name: User-Agent
          in: header
          required: true
          schema:
            type: string
            enum: [zhuzeyang-agent-runtime/1.0]
        - name: X-ZZ-Protocol-Version
          in: header
          required: true
          schema:
            type: string
            enum: [runtime.v1]
        - name: X-ZZ-Project-Id
          in: header
          required: true
          schema:
            type: string
        - name: X-ZZ-Session-Id
          in: header
          required: true
          schema:
            type: string
        - name: X-ZZ-Agent-Id
          in: header
          required: true
          schema:
            type: string
        - name: X-ZZ-Run-Id
          in: header
          required: true
          schema:
            type: string
        - name: X-ZZ-Delivery-Id
          in: header
          required: true
          schema:
            type: string
        - name: X-ZZ-Attempt
          in: header
          required: true
          schema:
            type: integer
            minimum: 1
        - name: X-ZZ-Timestamp
          in: header
          required: true
          schema:
            type: integer
        - name: X-ZZ-Trace-Id
          in: header
          required: true
          schema:
            type: string
        - name: X-ZZ-Idempotency-Key
          in: header
          required: true
          schema:
            type: string
        - name: X-ZZ-Signature
          in: header
          required: true
          schema:
            type: string
            pattern: "^sha256=[a-f0-9]{64}$"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentInvokeRequest"
      responses:
        "200":
          description: Synchronous runtime response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentInvokeResponse"
        "202":
          description: Async runtime response is unsupported in V1 and is classified as a failed run.
        "400":
          description: Invalid runtime request.

