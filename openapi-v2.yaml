    ProjectLicense:
      type: object
      required: [key, name, path]
      description: |
        Local-only license detection result. Identified by bounded keyword
        matching of well-known root license files. This is not an SPDX/OSI
        certification or legal compliance statement.
      properties:
        key:
          type: string
          description: SPDX-style license key (e.g. `mit`, `apache-2.0`).
        name:
