        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient role to create saved queries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: A saved query with this name already exists.
