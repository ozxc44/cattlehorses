  /v1/projects/{project_id}/commits:
    parameters:
      - $ref: "#/components/parameters/PidPath"
    get:
      operationId: listProjectCommits
      tags: [Versioning]
      summary: List project commits.
      description: |
        Returns commits with Project Space local provenance verification
        metadata. The verification object is local-only and does not represent
        GPG/SSH cryptographic signature verification.
      responses:
        "200":
          description: Commits ordered by created_at descending.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProjectCommit"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{project_id}/commits/{commit_id}:
    parameters:
      - $ref: "#/components/parameters/PidPath"
      - $ref: "#/components/parameters/CommitIdPath"
    get:
      operationId: getProjectCommit
      tags: [Versioning]
      summary: Get a single commit with snapshot.
      description: |
        Returns the full commit detail including the immutable snapshot.
        Each snapshot entry maps a file path to its file_id, revision_id,
        and content_hash at commit time. The frontend can use revision_id
        with GET /files/:file_id/revisions to retrieve historical content.
        The verification object describes local Project Space reviewed-merge
        provenance only and is not GPG/SSH cryptographic signature verification.
      responses:
        "200":
          description: Commit detail with snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectCommit"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Commit not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{project_id}/branches:
    parameters:
      - $ref: "#/components/parameters/PidPath"
    get:
      operationId: listProjectBranches
      tags: [Versioning]
      summary: List project branches.
      responses:
        "200":
          description: Branches ordered by name ascending.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProjectBranch"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{project_id}/branches/compare:
    parameters:
      - $ref: "#/components/parameters/PidPath"
    get:
      operationId: compareProjectBranches
      tags: [Versioning]
      summary: Compare two project branches by their HEAD commit snapshots.
      description: |
        Returns a diff of files between two branches. Requires both branches
        to have at least one commit (a HEAD snapshot). The response includes
        summary counts and a list of file entries with old/new content and
        revision ids.

        Rename detection is by equal-content hash matching only — when a file
        deleted in the head has the same content hash as an added file, it is
        reported as a `renamed` entry rather than separate deleted+added
        entries. Git similarity-based rename detection is not used.
      parameters:
        - name: base
          in: query
          required: true
          description: Branch name or id to use as the base (left side) of the comparison.
          schema:
            type: string
        - name: head
          in: query
          required: true
          description: Branch name or id to use as the head (right side) of the comparison.
          schema:
            type: string
      responses:
        "200":
          description: Branch comparison result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BranchCompareResponse"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: One or both branches not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Branch without HEAD commit.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Missing or invalid parameters (base, head).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{project_id}/archive.zip:
    parameters:
      - $ref: "#/components/parameters/ProjectIdPath"
    get:
      operationId: downloadProjectArchive
      tags: [Versioning]
      summary: Download a ZIP archive of project files.
      description: |
        Returns a ZIP archive containing the project's stored files.

        By default the archive includes the latest live project files, excluding
        soft-deleted files. When `branch` is provided, the archive is built from
        the branch's HEAD commit snapshot instead, using the exact revision
        contents captured at commit time.

        Requires `ViewProject` permission. Owner, admin, member, and viewer roles
        can download; non-members receive 403; unauthenticated requests receive
        401.
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: branch
          in: query
          required: false
          description: Branch name or id to archive. Defaults to live project files when omitted.
          schema:
            type: string
      responses:
        "200":
          description: ZIP archive of project files.
          content:
            application/zip:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              schema:
                type: string
              description: attachment; filename="<slug>[-<branch-slug>].zip"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Project or branch not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error (including unsafe archive paths).

    ProjectSummary:
      type: object
      required: [project_id, status, files, readme, last_updated_file, recent_activity, buckets]
      properties:
        project_id:
          type: string
        status:
          type: string
          enum: [active, archived]
        topics:
          type: array
          items:
            type: string
        files:
          type: object
          required: [total_count, total_bytes, directory_count, file_types]
          properties:
            total_count:
              type: integer
            total_bytes:
              type: integer
            directory_count:
              type: integer
            file_types:
              type: array
              items:
                type: object
                properties:
                  extension:
                    type: string
                  count:
                    type: integer
        readme:
          type: object
          nullable: true
          required: [file_id, path]
          properties:
            file_id:
              type: string
              format: uuid
            path:
              type: string
        license:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/ProjectLicense"
        last_updated_file:
          type: object
          nullable: true
          required: [file_id, path, updated_at]
          properties:
            file_id:
              type: string
              format: uuid
            path:
              type: string
            updated_at:
              type: string
              format: date-time
        recent_activity:
          type: object
          required: [files, revisions]
          properties:
            files:
              type: array
              items:
                type: object
                properties:
                  file_id:
                    type: string
                    format: uuid
                  path:
                    type: string
                  content_type:
                    type: string
                  size_bytes:
                    type: integer
                  updated_by:
                    type: string
                    format: uuid
                  updated_at:
                    type: string
                    format: date-time
            revisions:
              type: array
              items:
                type: object
                properties:
                  revision_id:
                    type: string
                    format: uuid
                  file_id:
                    type: string
                    format: uuid
                  path:
                    type: string
                  revision_number:
                    type: integer
                  message:
                    type: string
                    nullable: true
                  created_by:
                    type: string
                    format: uuid
                  created_at:
                    type: string
                    format: date-time
        buckets:
          type: object
          required: [deliverables, agent_result, agent_review, agent_trace]
          properties:
            deliverables:
              type: array
              items:
                type: object
                properties:
                  file_id:
                    type: string
                    format: uuid
                  path:
                    type: string
                  updated_at:
                    type: string
                    format: date-time
            agent_result:
              type: object
              nullable: true
              required: [file_id, path]
              properties:
                file_id:
                  type: string
                  format: uuid
                path:
                  type: string
            agent_review:
              type: object
              nullable: true
              required: [file_id, path]
