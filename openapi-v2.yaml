      tags: [Versioning]
      summary: Get a page-friendly diff view of a changeset.
      description: |
        Returns the changeset metadata plus a normalized file diff for each
        `file_op`. For `upsert` operations the old content is read from the
        supplied `base_revision_id` or the current file when no base revision is
        provided. Delete operations expose old content with no new content;
        rename operations expose both old and destination paths and preserve
        content unless a destination file already exists in the diff context.
