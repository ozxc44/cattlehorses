            $ref: "#/components/schemas/SecurityAdvisoryStatus"
          description: Filter by advisory status.
        - name: skip
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of rows to skip.
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
          description: Maximum rows to return. Capped at 100.
      responses:
        "200":
          description: Paginated list of security advisory summaries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSecurityAdvisoryListResponse"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid query parameter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createProjectSecurityAdvisory
      tags: [Security]
      summary: Create a project security advisory.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectSecurityAdvisoryCreate"
      responses:
        "201":
          description: Security advisory created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSecurityAdvisory"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: A security advisory with this slug already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /v1/projects/{pid}/security/manifest-hygiene-scan:
    parameters:
      - $ref: "#/components/parameters/PidPath"
    post:
      operationId: runProjectSecurityManifestHygieneScan
      tags: [Security]
      summary: Run a local project manifest hygiene check.
      description: |
        Deterministically inspects stored project files such as package.json,
