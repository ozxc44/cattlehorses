          enum: [draft, submitted]
          default: submitted
        file_ops:
          type: array
          items:
            $ref: "#/components/schemas/ProjectChangesetFileOp"
          minItems: 1
          maxItems: 100
        base_commit_id:
          type: string
          format: uuid
          nullable: true
        result_path:
          type: string
          nullable: true
        evidence_path:
          type: string
          nullable: true
        orchestration_id:
          type: string
          format: uuid
          nullable: true
        task_id:
          type: string
          format: uuid
          nullable: true

    ProjectChangesetUpdateRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 255
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, submitted]
        file_ops:
          type: array
          items:
            $ref: "#/components/schemas/ProjectChangesetFileOp"
          minItems: 1
          maxItems: 100

    ProjectChangesetRequestedReviewer:
      type: object
      required: [reviewer_type, reviewer_id, requested_at]
      properties:
        reviewer_type:
          type: string
          enum: [user]
        reviewer_id:
          type: string
          format: uuid
        requested_by_user_id:
          type: string
          format: uuid
          nullable: true
        requested_by_agent_id:
          type: string
          nullable: true
        requested_at:
          type: string
          format: date-time

    ProjectChangesetRequestedReviewerSummary:
      type: object
      required: [requested_count, reviewer_ids]
      properties:
        requested_count:
          type: integer
          description: Number of requested reviewers
        reviewer_ids:
          type: array
          description: UUIDs of requested reviewers
          items:
            type: string

    ProjectChangesetReviewRequest:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [approved, changes_requested, rejected]
        notes:
          type: string
          maxLength: 10000
          nullable: true

    ProjectChangesetStatusCheck:
      type: object
      required: [name, status, actor_type, actor_id, checked_at]
      properties:
        name:
          type: string
        status:
          type: string
          enum: [passed, failed, pending]
        summary:
          type: string
          nullable: true
        actor_type:
          type: string
          enum: [user, agent]
        actor_id:
          type: string
          format: uuid
        checked_at:
          type: string
          format: date-time

    ProjectChangesetStatusCheckSummary:
      type: object
      required: [total, passed, failed, pending, checks]
      properties:
        total:
          type: integer
          minimum: 0
        passed:
          type: integer
          minimum: 0
        failed:
          type: integer
          minimum: 0
        pending:
          type: integer
          minimum: 0
        checks:
          type: array
          items:
            $ref: "#/components/schemas/ProjectChangesetStatusCheck"

    ProjectChangesetStatusCheckRequest:
      type: object
      required: [name, status]
      properties:
        name:
          type: string
          description: Status-check name. Must start with a letter or number and may contain dot, underscore, slash, or dash.
          pattern: '^[A-Za-z0-9][A-Za-z0-9._/-]*$'
          maxLength: 80
        status:
          type: string
          enum: [passed, failed, pending]
        summary:
          type: string
          maxLength: 1000
          nullable: true

    ProjectChangesetListResponse:
      type: object
      required: [data, total, limit, offset, summary]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ProjectChangeset"
        total:
          type: integer
          minimum: 0
        limit:
          type: integer
        offset:
          type: integer
        summary:
          type: object
          required: [total, by_status]
          properties:
            total:
              type: integer
              minimum: 0
            by_status:
              type: object
              additionalProperties:
                type: integer
                minimum: 0

    ProjectChangesetDiffFile:
      type: object
      required: [op, path]
      properties:
        op:
          type: string
          enum: [upsert, delete, rename]
        path:
          type: string
        old_path:
          type: string
          nullable: true
        old_content:
          type: string
          nullable: true
        new_content:
          type: string
          nullable: true
        old_revision_id:
          type: string
          format: uuid
          nullable: true
        new_revision_id:
          type: string
          format: uuid
          nullable: true
        content_type:
          type: string
          nullable: true

    ProjectChangesetDiffResponse:
      type: object
      required: [changeset, files]
      properties:
        changeset:
          $ref: "#/components/schemas/ProjectChangeset"
        files:
          type: array
          items:
            $ref: "#/components/schemas/ProjectChangesetDiffFile"

    ProjectBranch:
      type: object
      required: [id, project_id, name, is_default, is_protected, protection, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        name:
          type: string
        is_default:
          type: boolean
          description: Whether this branch is the project default branch.
        is_protected:
          type: boolean
          description: Explicit protection flag for non-default branches. The default branch is effectively protected even when this flag is false.
        protection:
          type: object
          required: [is_protected, rules]
          properties:
            is_protected:
              type: boolean
              description: Effective protection status used by rename/delete policy.
            is_pattern_protected:
              type: boolean
              description: Whether this branch is effectively protected because its name matches a project-level protected branch pattern.
            rules:
              type: object
              required: [block_direct_writes]
              properties:
                block_direct_writes:
                  type: boolean
                  description: Whether direct POST /files writes are blocked for the effective default branch. Reviewed changeset merges remain allowed.
                direct_write_bypass_roles:
                  type: array
                  description: Project roles allowed to direct-write when block_direct_writes is enabled. Only owner, admin, and member are accepted.
                  items:
                    type: string
                    enum: [owner, admin, member]
                direct_write_bypass_user_ids:
                  type: array
                  description: User IDs of individual project members allowed to direct-write when block_direct_writes is enabled. Max 12; viewer members are not eligible.
                  maxItems: 12
                  items:
                    type: string
                    format: uuid
                  uniqueItems: true
                required_approvals:
                  type: integer
                  minimum: 0
                  maximum: 6
                  description: Minimum distinct approving reviewers required before merge. Duplicate approvals from the same user or agent do not increase this count.
                required_status_checks:
                  type: array
                  description: Unique list of local status-check names required before a changeset can merge into this branch.
                  maxItems: 8
                  items:
                    type: string
                    pattern: '^[A-Za-z0-9][A-Za-z0-9._/-]*$'
                    maxLength: 80
                  uniqueItems: true
                merge_queue_enabled:
                  type: boolean
                  description: Require approved changesets to be queued and reach queue position 1 before merge. Local ordering gate only; no external runner, auto-rebase, or auto-merge is connected.
                protected_branch_patterns:
                  type: array
                  description: Project-level protected branch-name patterns configured for this project. Stored on the default branch rule object and exposed on every branch for compatibility.
                  maxItems: 8
                  items:
                    type: string
                    pattern: '^[A-Za-z0-9/._*?-]+$'
                    minLength: 1
                    maxLength: 96
                  uniqueItems: true
        head_commit_id:
          type: string
          format: uuid
          nullable: true
        created_by_user_id:
          type: string
          format: uuid
          nullable: true
        created_by_agent_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateProjectBranchRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
          description: Branch name. Must be unique in the project and path-safe.
        source_branch:
          type: string
          description: Existing branch name or id to copy the HEAD from. Defaults to `main`.
        source_branch_id:
          type: string
          format: uuid
          description: Existing branch id to copy the HEAD from.
        source_commit_id:
          type: string
          format: uuid
          description: Explicit project commit id to use as the new branch HEAD.

    RenameProjectBranchRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
          description: New branch name. Default or protected branches cannot be renamed.

    BranchProtectionRequest:
      type: object
      required: [is_protected]
      description: |
        Toggle explicit protection for a non-default branch. Protected
        branches cannot be renamed or deleted through branch management
        endpoints. The default branch is always effectively protected and
        cannot be toggled through this endpoint.
      properties:
        is_protected:
          type: boolean

    BranchProtectionRulesRequest:
      type: object
      required: [block_direct_writes]
      description: |
        Toggle implemented branch-protection rules. This MVP supports the
        Gitea/GitHub-style direct-write gate, narrow role-based direct-write
        exceptions, user-specific direct-write bypass for write-capable members,
        a conservative minimum-approval merge gate, local required status
        checks recorded on changesets, protected branch-name patterns, and a
        local merge queue that requires approved changesets to reach queue head.
        Patterns are stored on the default branch rule object and enforced as
        project-level branch-name policy. Force-push rules and signed commits
        are not implemented in this slice. The merge queue is local ordering
        only; it does not provide external CI, auto-rebase, or provider auto-merge.
      properties:
        block_direct_writes:
          type: boolean
          description: Block direct file writes to the effective default branch. Reviewed changeset approve-and-merge remains allowed.
        direct_write_bypass_roles:
          type: array
          description: Project roles allowed to direct-write when block_direct_writes is enabled. Only owner, admin, and member are accepted.
          items:
            type: string
            enum: [owner, admin, member]
        direct_write_bypass_user_ids:
          type: array
          description: User IDs of individual project members allowed to direct-write when block_direct_writes is enabled. Max 12; viewer members are not eligible.
          maxItems: 12
          items:
            type: string
            format: uuid
          uniqueItems: true
        required_approvals:
          type: integer
          minimum: 0
          maximum: 6
          description: Minimum distinct approving reviewers required before merge. `0` disables this gate.
        required_status_checks:
          type: array
          description: Unique list of local status-check names required before a changeset can merge into this branch. Each name must start with a letter or number and may contain dot, underscore, slash, or dash. Maximum 8 checks.
          maxItems: 8
          items:
            type: string
            pattern: '^[A-Za-z0-9][A-Za-z0-9._/-]*$'
            maxLength: 80
          uniqueItems: true
        merge_queue_enabled:
          type: boolean
          description: Require approved changesets to be queued and reach queue position 1 before merge. Local ordering gate only; no external runner, auto-rebase, or auto-merge is connected.
        protected_branch_patterns:
          type: array
          description: |
            Project-level branch-name patterns that make matching non-default
            branches effectively protected. Stored on the default branch rule
            object regardless of which branch's protection-rules endpoint is
            used. Each pattern must contain at least one wildcard (`*` or `?`),
            may only include ASCII letters, numbers, slash, dot, underscore,
            dash, star, or question mark, and is matched case-sensitively
            against full branch names. Maximum 8 patterns.
          maxItems: 8
          items:
            type: string
            pattern: '^[A-Za-z0-9/._*?-]+$'
            minLength: 1
            maxLength: 96
          uniqueItems: true

    BranchCompareResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [base_branch, head_branch, summary, files]
          properties:
            base_branch:
              $ref: "#/components/schemas/ProjectBranch"
            head_branch:
              $ref: "#/components/schemas/ProjectBranch"
            summary:
              type: object
              required: [files_changed, added, modified, deleted, renamed]
              properties:
                files_changed:
                  type: integer
                  description: Total number of changed files.
                added:
                  type: integer
                  description: Number of files present in head but not in base.
                modified:
                  type: integer
                  description: Number of files present in both branches with different revision ids.
                deleted:
                  type: integer
                  description: Number of files present in base but not in head.
                renamed:
                  type: integer
                  description: Number of files detected as renames by equal-content hash matching.
                total:
                  type: integer
                  description: Compatibility alias for files_changed.
            files:
              type: array
              items:
                $ref: "#/components/schemas/BranchCompareFileEntry"

    BranchCompareFileEntry:
      type: object
      required: [path, op]
      properties:
        path:
          type: string
          description: File path relative to project root (new path for renamed files).
        old_path:
          type: string
          nullable: true
          description: Previous file path (non-null only for renamed files).
        op:
          type: string
          enum: [added, modified, deleted, renamed]
          description: |
            Change operation type. `renamed` is produced by equal-content
            hash matching between a deleted and an added file; it is not
            Git similarity detection.
        old_content:
          type: string
          nullable: true
          description: Previous file content (null for added files).
        new_content:
          type: string
          nullable: true
          description: New file content (null for deleted files).
        old_revision_id:
          type: string
          format: uuid
          nullable: true
          description: Revision id of the file in the base branch (null for added files).
        new_revision_id:
          type: string
          format: uuid
          nullable: true
          description: Revision id of the file in the head branch (null for deleted files).
        old_content_hash:
          type: string
          nullable: true
          description: Content hash of the file in the base branch.
        new_content_hash:
          type: string
          nullable: true
          description: Content hash of the file in the head branch.

    ProjectCommit:
      type: object
      required: [id, project_id, branch_id, parent_commit_id, message, changed_files, verification, created_at]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        branch_id:
          type: string
          format: uuid
        parent_commit_id:
          type: string
          format: uuid
          nullable: true
        message:
          type: string
          nullable: true
        changed_files:
          type: array
          items:
            type: object
        snapshot:
          type: object
          description: |
            Map of file path to snapshot entry. Each entry captures the
            file_id, revision_id, and content_hash at commit time. The
            snapshot is immutable — later file updates create new revisions
            and do not mutate previously-committed snapshot values.
          additionalProperties:
            $ref: "#/components/schemas/ProjectCommitSnapshotItem"
        changeset_id:
          type: string
          format: uuid
          nullable: true
        orchestration_id:
          type: string
          format: uuid
          nullable: true
        task_id:
          type: string
          format: uuid
          nullable: true
        verification:
          $ref: "#/components/schemas/ProjectCommitVerification"
        created_by_user_id:
          type: string
          format: uuid
          nullable: true
        created_by_agent_id:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time

    ProjectCommitVerification:
      type: object
      required: [status, verified, local_only, cryptographic, source, reason, actor_type, actor_id, verified_at, description]
      properties:
        status:
          type: string
          enum: [verified, unverified, unavailable]
          description: Local Project Space verification status.
        verified:
          type: boolean
          description: True only when Project Space can prove local reviewed-merge provenance.
        local_only:
          type: boolean
          description: Always true for this local provenance MVP.
        cryptographic:
          type: boolean
          description: Always false; this is not GPG/SSH signature verification.
        source:
          type: string
          description: Local source that produced the verification state.
        reason:
          type: string
          nullable: true
        actor_type:
          type: string
          nullable: true
          enum: [user, agent, null]
        actor_id:
          type: string
          format: uuid
          nullable: true
        verified_at:
          type: string
          format: date-time
          nullable: true
        description:
          type: string
          description: Human-readable explanation, explicitly distinguishing local provenance from GPG/SSH signatures.

    ProjectCommitSnapshotItem:
      type: object
      required: [file_id, content_hash]
      properties:
        file_id:
          type: string
          format: uuid
          description: The file id at the time of the commit.
        revision_id:
          type: string
          format: uuid
          nullable: true
          description: |
            The revision id captured at commit time. Immutable — later file
            updates create new revisions and do not mutate this value. The
            frontend can pass this to GET /files/:file_id/revisions to
            retrieve the historical content.
        content_hash:
          type: string
          description: SHA-256 hex digest of the file content at commit time.

    ProjectTagSummary:
      type: object
      required: [tag_name, release_id, release_title, target_commit_id, target_commit, draft, prerelease, published_at, created_at, updated_at]
      properties:
        tag_name:
          type: string
          description: Release-backed tag name.
        release_id:
          type: string
          format: uuid
        release_title:
          type: string
        target_commit_id:
          type: string
          nullable: true
        target_commit:
          anyOf:
            - $ref: "#/components/schemas/ProjectCommit"
            - type: "null"
          description: Commit summary when target_commit_id points to an existing project commit.
        draft:
          type: boolean
        prerelease:
          type: boolean
        published_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ProjectTagsListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ProjectTagSummary"
        meta:
          type: object
          required: [total, skip, limit]
          properties:
            total:
              type: integer
              minimum: 0
            skip:
              type: integer
              minimum: 0
            limit:
              type: integer
              minimum: 1

paths:
  /v1/auth/token:
    post:
      operationId: createToken
      tags: [Auth]
      summary: Exchange API key for a Bearer token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRequest"
      responses:
        "200":
          description: Token issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Invalid API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /v1/auth/me:
    get:
      operationId: getMe
      tags: [Auth]
      summary: Get the current authenticated principal.
      responses:
        "200":
          description: Current principal.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/users/search:
    get:
      operationId: searchUsers
      tags: [Auth]
      summary: Search registered human users by email or display name.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
          description: Case-insensitive user search term.
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Matching registered users.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/UserSearchResult"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Missing or too-short query.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /v1/projects:
    get:
      operationId: listProjects
      tags: [Projects]
      summary: List projects visible to the current user.
      parameters:
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Projects.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createProject
      tags: [Projects]
      summary: Create a project.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectCreate"
      responses:
        "201":
          description: Project created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "422":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /v1/projects/{pid}:
    parameters:
      - $ref: "#/components/parameters/PidPath"
    get:
      operationId: getProject
      tags: [Projects]
      summary: Get a project.
      responses:
        "200":
          description: Project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateProject
      tags: [Projects]
      summary: Update project metadata or archive state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Project updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createProjectBranch
      tags: [Versioning]
      summary: Create a project branch.
      description: Owner/admin only. Creates a non-default branch from an existing branch or explicit project commit.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBranchRequest"
      responses:
        "201":
          description: Branch created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectBranch"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Source branch or commit not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Branch name already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid branch name.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{project_id}/branches/{branch_id}:
    parameters:
      - $ref: "#/components/parameters/PidPath"
      - name: branch_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      operationId: renameProjectBranch
      tags: [Versioning]
      summary: Rename a non-default project branch.
      description: Owner/admin only. The default `main` branch is protected and cannot be renamed in this slice.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameProjectBranchRequest"
      responses:
        "200":
          description: Branch renamed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectBranch"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Branch not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Default branch protected or duplicate branch name.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid branch name.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteProjectBranch
      tags: [Versioning]
      summary: Delete a non-default project branch.
      description: Owner/admin only. The default `main` branch and branches with commits or changesets are protected.
      responses:
        "204":
          description: Branch deleted.
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Branch not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Default branch protected or branch is in use.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{project_id}/branches/{branch_id}/default:
    parameters:
      - $ref: "#/components/parameters/PidPath"
      - name: branch_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      operationId: setDefaultBranch
      tags: [Versioning]
      summary: Set a branch as the project default.
      description: Owner/admin only. The previously default branch loses default status. The target branch id comes from the path.
      responses:
        "200":
          description: Default branch updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectBranch"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions. Viewer or outsider cannot set default branch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Target branch not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/projects/{project_id}/branches/{branch_id}/protection:
    parameters:
      - $ref: "#/components/parameters/PidPath"
      - name: branch_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      operationId: setBranchProtection
      tags: [Versioning]
      summary: Toggle explicit branch protection.
      description: Owner/admin only. The default branch is always effectively protected and returns 409 if toggled.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BranchProtectionRequest"
      responses:
        "200":
          description: Branch protection updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectBranch"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Branch not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Cannot toggle the default branch because it is always protected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Missing or invalid is_protected boolean.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{project_id}/branches/{branch_id}/protection-rules:
    parameters:
      - $ref: "#/components/parameters/PidPath"
      - name: branch_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      operationId: setBranchProtectionRules
      tags: [Versioning]
      summary: Toggle implemented branch protection rules.
      description: Owner/admin only. Supports `block_direct_writes`, direct-write bypass roles/users, required approvals, local required status checks, and local protected branch-name patterns; reviewed changeset merges remain allowed when direct writes are blocked.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BranchProtectionRulesRequest"
      responses:
        "200":
          description: Branch protection rules updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectBranch"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Branch not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid request body.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{project_id}/summary:
    parameters:
      - $ref: "#/components/parameters/ProjectIdPath"
    get:
      operationId: getProjectSummary
      tags: [Project Space]
      summary: Get lightweight project-space summary.
      description: |
        Returns file totals, README detection, recent activity, convention
        buckets, and local-only root license detection. License information is
        derived from real project files using bounded keyword matching and is
        not an external SPDX/OSI certification. Requires project view
        permission.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Project summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSummary"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{project_id}/languages:
    parameters:
      - $ref: "#/components/parameters/ProjectIdPath"
    get:
      operationId: getProjectLanguages
      tags: [Project Space]
      summary: Get repository language breakdown.
      description: |
        Returns a deterministic, read-only breakdown of project file bytes by
        programming language. Counts are derived from real, non-deleted project
        files using stored byte lengths. Language classification is
        extension-only and conservative: files without a recognized extension
        (including most binaries) are omitted from the totals rather than
        guessed. The response includes `source` and `limitations` so callers
        understand the local-only nature of the estimate. Requires ViewProject
        permission.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Project language breakdown.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectLanguagesResponse"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{project_id}/topics:
    parameters:
      - $ref: "#/components/parameters/ProjectIdPath"
    get:
      operationId: getProjectTopics
      tags: [Projects]
      summary: Get project topics.
      description: |
        Returns the project's local repository topic list. Requires ViewProject
        permission.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Project topics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectTopicsResponse"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: updateProjectTopics
      tags: [Projects]
      summary: Replace project topics.
      description: |
        Replaces the entire project topic list. Reuses the same validation as
        project creation and update: array of trimmed strings, max 20 entries,
        max 50 characters each, duplicates collapsed case-insensitively, empty
        strings dropped, and control characters rejected. Requires EditProject
        permission.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectTopicsUpdateRequest"
      responses:
        "200":
          description: Updated project topics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectTopicsResponse"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid topic list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/topics/search:
    get:
      operationId: searchProjectTopics
      tags: [Projects]
      summary: Search distinct topics across visible projects.
      description: |
        Returns distinct local repository topics from projects where the caller
        is a member. Optionally filter with a case-insensitive `q` substring.
        Bounded and paginated. Does not expose topics from projects the caller
        cannot access.
      security:
        - BearerAuth: []
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Case-insensitive substring filter.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            maximum: 100
            minimum: 1
          description: Maximum topics to return.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
          description: Number of topics to skip.
      responses:
        "200":
          description: Distinct topic list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectTopicsSearchResponse"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{project_id}/readme:
    parameters:
      - $ref: "#/components/parameters/ProjectIdPath"
    get:
      operationId: getProjectReadme
      tags: [Project Space]
      summary: Get repository README content.
      description: |
        Returns the content of the project's preferred README file for repository
        pages. README candidates are detected case-insensitively from known names
        (`README.md`, `README.markdown`, `README.txt`, `README`) and root-level
        candidates are preferred over nested ones. If no README exists, returns
        404 with `{"detail": "README not found"}`. Supports an optional `branch`
        query parameter when the branch has a commit snapshot; otherwise falls
        back to the default working tree.
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: branch
          in: query
          description: Optional branch name or id to resolve README from a commit snapshot.
          schema:
            type: string
      responses:
        "200":
          description: README content.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectReadme"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions or agent does not belong to this project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Project or README not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{pid}/overview:
    parameters:
      - $ref: "#/components/parameters/PidPath"
    get:
      operationId: getProjectOverview
      tags: [Projects]
      summary: Get compact project overview.
      description: |
        Returns a project home overview with summary counts, attention items,
        recent orchestrations/files, workload, and health signals. Accepts JWT
        (Bearer) users and agent API keys; agent callers only see
        orchestrations, tasks, and files within their visible scope.
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: attention_limit
          in: query
          description: Maximum attention items per category.
          schema:
            type: integer
            minimum: 1
            default: 5
        - name: recent_orchestrations_limit
          in: query
          description: Maximum recent orchestrations to return.
          schema:
            type: integer
            minimum: 1
            default: 5
        - name: recent_files_limit
          in: query
          description: Maximum recent files to return.
          schema:
            type: integer
            minimum: 1
            default: 10
        - name: recent_health_limit
          in: query
          description: Maximum recent health signals to return.
          schema:
            type: integer
            minimum: 1
            default: 5
      responses:
        "200":
          description: Project overview.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectOverview"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{pid}/orchestration-tasks:
    parameters:
      - $ref: "#/components/parameters/PidPath"
    get:
      operationId: listProjectOrchestrationTasks
      tags: [Projects]
      summary: List project-level orchestration tasks.
      description: |
        Returns a paginated, filterable list of orchestration tasks across all
        orchestrations in the project. Agent callers only see tasks within their
        visible scope: tasks assigned to them, tasks in orchestrations where they
        are the main agent, or tasks in orchestrations where any task is assigned
        to them.
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      parameters:
        - name: status
          in: query
          description: Comma-separated task status values to filter by.
          schema:
            type: string
        - name: q
          in: query
          description: Case-insensitive search across task title, goal, and orchestration title.
          schema:
            type: string
        - name: assigned_agent_id
          in: query
          description: Filter by assigned agent. Agents may only filter by their own id.
          schema:
            type: string
        - name: limit
          in: query
          description: Maximum rows to return. Capped at 200.
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          description: Number of rows to skip.
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: sort
          in: query
          description: Sort order for results.
          schema:
            type: string
            enum: [updated, created, status]
            default: updated
      responses:
        "200":
          description: Paginated list of project orchestration tasks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectOrchestrationTaskListResponse"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions or agent filter violation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid status filter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{pid}/orchestration-tasks/{task_id}:
    parameters:
      - $ref: "#/components/parameters/PidPath"
      - $ref: "#/components/parameters/TaskIdPath"
    get:
      operationId: getProjectOrchestrationTask
      tags: [Projects]
      summary: Get a project-level orchestration task.
      description: |
        Returns a single orchestration task by id, including orchestration
        context. Agent callers follow the same visibility rule as the list
        endpoint.
      security:
        - BearerAuth: []
        - ApiKeyAuth: []
      responses:
        "200":
          description: Project orchestration task detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectOrchestrationTask"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Agent caller is outside the task's visible scope.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Task not found in this project.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

