  /v1/projects/{pid}/files/{file_id}/revisions/compare:
    parameters:
      - $ref: "#/components/parameters/PidPath"
      - $ref: "#/components/parameters/FileIdPath"
    get:
      operationId: compareProjectFileRevisions
      tags: [Project Space]
      summary: Compare two revisions for the same project file.
      description: Compares stored `ProjectFileRevision` content for one file. This is a read-only revision diff helper and does not imply rollback, patch application, Git blame, branch merge, or restore semantics.
      parameters:
        - in: query
          name: base_revision_id
          required: true
          schema:
            type: string
          description: Older/base revision id for this file.
        - in: query
          name: head_revision_id
          required: true
          schema:
            type: string
          description: Newer/head revision id for this file.
      responses:
        "200":
          description: File revision comparison.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ProjectFileRevisionCompareResponse"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: File revision not found for this project/file.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Missing revision id parameters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

