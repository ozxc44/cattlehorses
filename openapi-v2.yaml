            - total_events
            - covered_events
            - missing_hash_count
            - latest_event_id
            - latest_hash
            - broken_at_event_id
            - description
          properties:
            available:
              type: boolean
              description: Whether local audit hash-chain attestation is available.
            status:
              type: string
              enum: [empty, verified, broken]
              description: Current local hash-chain verification state.
            verified:
              type: boolean
              description: True when every covered event matches the stored local hash chain.
            local_only:
              type: boolean
              enum: [true]
              description: This is a local integrity proof only.
            legal_grade:
              type: boolean
              enum: [false]
              description: This is not legal-grade immutable attestation.
            algorithm:
              type: string
              enum: [sha256]
            version:
              type: string
              enum: [v1]
            total_events:
              type: integer
              minimum: 0
            covered_events:
              type: integer
              minimum: 0
            missing_hash_count:
              type: integer
              minimum: 0
            latest_event_id:
              type: string
              format: uuid
              nullable: true
            latest_hash:
              type: string
              nullable: true
              pattern: "^[a-f0-9]{64}$"
            broken_at_event_id:
              type: string
              format: uuid
              nullable: true
            description:
              type: string
        legal_hold:
          type: object
          required: [enabled, status, description]
          properties:
            enabled:
              type: boolean
              description: Whether legal hold is currently active for this project.
            status:
              type: string
              enum: [enabled, disabled]
              description: Legal hold operational status.
            description:
              type: string
              description: Human-readable explanation of the legal hold state.

    AgentScope:
      type: string
      enum:
        - agent:read
        - sessions:read
        - messages:write
        - health:write

    AgentPresence:
      type: string
      enum: [online, stale, offline]

    Agent:
      type: object
      required: [id, project_id, name, endpoint_url, status, created_at, updated_at]
      properties:
        id:
          type: string
        project_id:
          type: string
        name:
          type: string
        description:
          type: string
        system_prompt:
          type: string
        endpoint_url:
          type: string
          format: uri
          description: Full runtime invoke URL called directly by the platform.
        api_key_prefix:
          type: string
          description: Non-secret prefix of the agent service token.
        invoke_secret_prefix:
          type: string
          description: Non-secret prefix of the runtime HMAC secret.
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/AgentScope"
        status:
          type: string
          enum: [active, inactive, idle, error]
        presence:
          $ref: "#/components/schemas/AgentPresence"
        health_status:
          type: string
          enum: [healthy, degraded, down]
        is_online:
          type: boolean
          description: True when the agent has a fresh heartbeat and is eligible for new work.
        dispatchable:
          type: boolean
          description: True when orchestration can assign the agent new PM/worker tasks.
        last_heartbeat_at:
          type: string
          format: date-time
          nullable: true
        heartbeat_age_ms:
          type: integer
          nullable: true
          description: Milliseconds since the last heartbeat, or null when the agent has never checked in.
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AgentCreate:
      type: object
      required: [name, endpoint_url, invoke_secret]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
        description:
          type: string
          maxLength: 512
        system_prompt:
          type: string
        endpoint_url:
          type: string
          format: uri
          description: Full runtime invoke URL, for example `http://localhost:9001/zz/v1/invoke`.
        invoke_secret:
          type: string
          minLength: 16
          writeOnly: true
          description: Shared HMAC secret used to sign runtime.v1 invoke requests.
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/AgentScope"
          default: ["agent:read", "sessions:read", "messages:write", "health:write"]

    AgentUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 64
        description:
          type: string
          maxLength: 512
        system_prompt:
          type: string
        endpoint_url:
          type: string
          format: uri
        invoke_secret:
          type: string
          minLength: 16
          writeOnly: true
          description: Replaces the stored runtime HMAC secret when present.
        scopes:
          type: array
          items:
            $ref: "#/components/schemas/AgentScope"
        status:
          type: string
          enum: [offline, idle, running, error]

    SessionStatus:
      type: string
      enum: [active, closed, archived]

    Session:
      type: object
      required: [id, project_id, status, participants, last_seq, created_at, updated_at]
      properties:
        id:
          type: string
        project_id:
          type: string
        title:
          type: string
        status:
          $ref: "#/components/schemas/SessionStatus"
        participants:
          type: array
          items:
            $ref: "#/components/schemas/SessionParticipant"
        last_seq:
          type: integer
          minimum: 0
          description: Last committed event sequence for this session.
        created_by:
          type: string
        version:
          type: integer
          minimum: 1
          description: Optimistic concurrency version for PATCH.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SessionCreate:
      type: object
      required: [agent_ids]
      properties:
        title:
          type: string
          maxLength: 256
        agent_ids:
          type: array
          minItems: 1
          items:
            type: string
          description: Agents to join as active session participants.

    SessionUpdate:
      type: object
      properties:
        title:
          type: string
          maxLength: 256
        status:
          $ref: "#/components/schemas/SessionStatus"
        version:
          type: integer
          minimum: 1

    SessionParticipant:
      type: object
      required: [id, session_id, participant_type, ref_id, role, status, joined_at]
      properties:
        id:
          type: string
        session_id:
          type: string
        participant_type:
          type: string
          enum: [user, agent]
        ref_id:
          type: string
          description: User id or agent id addressed by this participant.
        role:
          type: string
          enum: [owner, admin, member, viewer, agent]
        status:
          type: string
          enum: [active, left, removed]
        joined_at:
          type: string
          format: date-time

    MessageVisibility:
      type: string
      enum: [session, direct]
      description: "`direct` is visible only to sender, recipients, owner, and admin."

    Message:
      type: object
      required:
        - id
        - session_id
        - sender_participant_id
        - sender_type
        - content
        - content_type
        - visibility
        - recipient_participant_ids
        - dispatch_ttl
        - seq
        - created_at
      properties:
        id:
          type: string
        session_id:
          type: string
        sender_participant_id:
          type: string
        sender_type:
          type: string
          enum: [user, agent, system]
        sender_id:
          type: string
        content:
          type: string
        content_type:
          type: string
          enum: [text, markdown, json]
        visibility:
          $ref: "#/components/schemas/MessageVisibility"
        recipient_participant_ids:
          type: array
          items:
            type: string
          description: Empty means broadcast; non-empty means targeted delivery.
        dispatch_ttl:
          type: integer
          minimum: 0
          description: Remaining dispatch propagation depth. Zero stops propagation.
        parent_message_id:
          type: string
        source_run_id:
          type: string
        idempotency_key:
          type: string
        seq:
          type: integer
          minimum: 1
        created_at:
          type: string
          format: date-time

    CreateMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1
        content_type:
          type: string
          enum: [text, markdown, json]
          default: text
        recipient_participant_ids:
          type: array
          items:
            type: string
          default: []
          description: Empty array broadcasts to the session; non-empty targets specific participants.
        visibility:
          $ref: "#/components/schemas/MessageVisibility"
          default: session
        dispatch_ttl:
          type: integer
          minimum: 0
          maximum: 8
          default: 1
          description: Prevents agent-to-agent ping-pong; zero records only the message.
        idempotency_key:
          type: string
          minLength: 1
          maxLength: 128
          description: Client-provided key for idempotent message/event creation.
        parent_message_id:
          type: string
        source_run_id:
          type: string
          description: Run id when an agent posts a reply for an assigned run.

    EventType:
      type: string
      enum:
        - session.created
        - session.updated
        - participant.joined
        - participant.left
        - message.created
        - agent.run.queued
        - agent.run.started
        - agent.run.completed
        - agent.run.failed
        - health.metric

    EventEnvelope:
      type: object
      required: [id, seq, type, session_id, project_id, payload, created_at]
      properties:
        id:
          type: string
          description: Unique event identifier.
        seq:
          type: integer
          minimum: 1
          description: Monotonically increasing sequence number within a session.
        type:
          $ref: "#/components/schemas/EventType"
        session_id:
          type: string
        project_id:
          type: string
        actor_participant_id:
          type: string
        payload:
          oneOf:
            - $ref: "#/components/schemas/MessageCreatedPayload"
            - $ref: "#/components/schemas/AgentRunQueuedPayload"
            - $ref: "#/components/schemas/AgentRunStartedPayload"
            - $ref: "#/components/schemas/AgentRunCompletedPayload"
            - $ref: "#/components/schemas/AgentRunFailedPayload"
            - $ref: "#/components/schemas/HealthMetricPayload"
          description: Event-type-specific payload.
        idempotency_key:
          type: string
        trace_id:
          type: string
        created_at:
          type: string
          format: date-time

    MessageCreatedPayload:
      type: object
      required: [message_id, sender_participant_id, visibility, recipient_participant_ids]
      properties:
        message_id:
          type: string
        sender_participant_id:
          type: string
        sender_type:
          type: string
          enum: [user, agent, system]
        content_type:
          type: string
          enum: [text, markdown, json]
        visibility:
          $ref: "#/components/schemas/MessageVisibility"
        recipient_participant_ids:
          type: array
          items:
            type: string
        dispatch_ttl:
          type: integer
          minimum: 0
        parent_message_id:
          type: string
        source_run_id:
          type: string

    AgentRunQueuedPayload:
