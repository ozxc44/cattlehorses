    ProjectFileWrite:
      type: object
      required: [path, content]
      description: |
        Create or overwrite a project file. For inline editing of an existing
        file, `base_revision_id` is **required** and must match the file's
        `current_revision_id`; a stale value returns `409 File revision conflict`.
        Omit `base_revision_id` only when creating a new file.
      properties:
        path:
          type: string
          description: Relative project path. Must not start with `/` or contain `..`.
        content:
          type: string
          maxLength: 1048576
        content_type:
          type: string
          enum: [text/markdown, text/plain, application/json]
          default: text/markdown
        base_revision_id:
          type: string
          description: |
            Current revision id of the file being edited. Required when the file
            already exists; omit (or set `null`) when creating a new file. Used
            as an optimistic concurrency guard.
        message:
          type: string
          maxLength: 512

    ProjectFileUploadItem:
      type: object
      required: [path, content_base64]
      description: A single file within a browser upload batch.
      properties:
        path:
          type: string
          minLength: 1
          maxLength: 1024
          description: Relative project path. Must not start with `/` or contain `..`.
        content_base64:
          type: string
          minLength: 1
          description: File content encoded as base64 for safe JSON transport.
        content_type:
          type: string
          maxLength: 64
          default: application/octet-stream
          description: MIME type of the decoded content. Defaults to application/octet-stream.
        base_revision_id:
          type: string
          nullable: true
          description: |
            Required to overwrite an existing file. Must match the file's
            `current_revision_id`; a stale value returns `409`.
        message:
          type: string
          maxLength: 512
          description: Optional per-file revision message.

    ProjectFileUploadBatch:
      type: object
      required: [files]
      description: |
        Batch upload request. The transaction is atomic: if any file fails
        validation or has a revision conflict, no files are persisted.
      properties:
        files:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: "#/components/schemas/ProjectFileUploadItem"
        message:
          type: string
          maxLength: 512
          description: Default revision message applied to files that do not supply their own.

    ProjectFileUploadResponse:
      type: object
      required: [data]
      description: Result of a successful batch upload.
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ProjectFileUpsertResponse"

    ProjectFileRename:
      type: object
      required: [path, base_revision_id]
      properties:
        path:
          type: string
          description: New relative project path. Must not start with `/` or contain `..`.
        base_revision_id:
          type: string
          description: Current revision id used as an optimistic concurrency guard.
        message:
          type: string
          maxLength: 512

    ProjectFileDelete:
      type: object
      required: [base_revision_id]
      properties:
        base_revision_id:
          type: string
          description: Current revision id used as an optimistic concurrency guard.
        message:
          type: string
          maxLength: 512
          description: Ignored by the server; reserved for future audit logging.

    ProjectFileRenameResponse:
      type: object
      allOf:
        - $ref: "#/components/schemas/ProjectFile"
      properties:
        old_path:
          type: string
          description: Previous project path before the rename.
        revision:
          $ref: "#/components/schemas/ProjectFileRevision"

    ProjectFileDeleteResponse:
      type: object
      required: [id, project_id, path, deleted_at, current_revision_id]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        path:
          type: string
        deleted_at:
          type: string
          format: date-time
        current_revision_id:
          type:
            - string
            - "null"

    ProjectFileUpsertResponse:
      type: object
      description: |
        Result of creating or updating a project file. Includes the full file
        record plus the newly created revision so the inline editor can refresh
        its `current_revision_id` and revision number.
      allOf:
        - $ref: "#/components/schemas/ProjectFile"
      properties:
        revision:
          $ref: "#/components/schemas/ProjectFileRevision"

