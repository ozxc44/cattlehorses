openapi: "3.1.0"
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: ZZ Agent Platform API V2
  version: "2.0.0"
  description: |
    Project-scoped Agent Collaboration OS.

    The V1 API boundary is fixed at 25 REST operations for the core loop:
    create a project, register agents, create a shared session, send broadcast
    or targeted messages, persist append-only events, stream or replay the
    timeline, and report/read agent health.

    ## Runtime Adapter V1

    Agents are invoked through platform-driven synchronous HTTP calls to the
    registered `endpoint_url`, commonly `POST /zz/v1/invoke`. The platform uses
    the stored full URL directly.

    Required outbound headers:

    ```http
    Content-Type: application/json
    User-Agent: zhuzeyang-agent-runtime/1.0
    X-ZZ-Protocol-Version: runtime.v1
    X-ZZ-Project-Id: proj_x
    X-ZZ-Session-Id: sess_x
    X-ZZ-Agent-Id: agent_x
    X-ZZ-Run-Id: run_x
    X-ZZ-Delivery-Id: deliv_x
    X-ZZ-Attempt: 1
    X-ZZ-Timestamp: <unix_seconds>
    X-ZZ-Trace-Id: trace_x
    X-ZZ-Idempotency-Key: run_x:attempt:1
    X-ZZ-Signature: sha256=<hmac>
    ```

    Signing uses:

    ```text
    body_hash = sha256(raw_body)
    signed_payload = timestamp + "." + delivery_id + "." + body_hash
    signature = hmac_sha256(invoke_secret, signed_payload)
    ```

    V1 supports synchronous responses only. `200` with `completed` writes agent
    messages, metrics, and `agent.run.completed`; `200` with `no_reply` writes
    `agent.run.completed`; `200` with `failed` or `rejected` writes
    `agent.run.failed`. `202`, network failures, timeouts, invalid JSON, and
    schema failures are treated as failed runs.

    ## Event Log

    Events are append-only and session-scoped by monotonically increasing `seq`.
    `after_seq` query parameters are exclusive. Clients should reconnect SSE
    streams with the last received `seq`.

    ## Authentication

    All endpoints require a Bearer token unless an operation explicitly says
    otherwise. Human tokens are authorized through project RBAC. Agent service
    tokens are limited to their assigned project, sessions, runs, and own health.
  contact:
    name: ZZ Agent Team
    url: https://zhuzeyang.xyz/agent
  license:
    name: Proprietary
    url: https://zhuzeyang.xyz/agent

servers:
  - url: https://zhuzeyang.xyz/agent
    description: Production
  - url: http://127.0.0.1:8000
    description: Local development

tags:
  - name: Auth
    description: API key exchange and current principal lookup.
  - name: Projects
    description: Project workspaces for agent collaboration.
  - name: Members
    description: Project member management and RBAC.
  - name: Project Space
    description: Markdown files, revisions, project memories, join requests, and cloning.
  - name: Agents
    description: Project-scoped agent registry and configuration.
  - name: Sessions
    description: Shared sessions, participants, and messages.
  - name: Events
    description: Append-only event replay and SSE streaming.
  - name: Health
    description: System and agent observability.
  - name: Notification Metrics
    description: Project and admin notification observability for heartbeat + durable inbox health.
  - name: Debug
    description: Operator-only NAS/LAN JSONL debug log access.
  - name: Agent Runtime
    description: Agent-facing endpoints for project discovery, durable inbox, and workload ledger. Authenticated with agent API key.
  - name: Runtime
    description: Outbound runtime.v1 invoke contract for registered agents.
  - name: Versioning
    description: Project branches, commits, and changeset review/merge workflow.
  - name: Security
    description: Project security advisories.

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    DebugTokenAuth:
      type: apiKey
      in: header
      name: X-Debug-Token

  parameters:
    PidPath:
      name: pid
      in: path
      required: true
      schema:
        type: string
      description: Project identifier.
    ProjectIdPath:
      name: project_id
      in: path
      required: true
      schema:
        type: string
      description: Project identifier.
    AidPath:
      name: aid
      in: path
      required: true
      schema:
        type: string
      description: Agent identifier.
    SidPath:
      name: sid
      in: path
      required: true
      schema:
        type: string
      description: Session identifier.
    UidPath:
      name: uid
      in: path
      required: true
      schema:
        type: string
      description: User identifier.
    FileIdPath:
      name: file_id
      in: path
      required: true
      schema:
        type: string
      description: Project file identifier.
    JoinRequestIdPath:
      name: request_id
      in: path
      required: true
      schema:
        type: string
      description: Project join request identifier.
    TaskIdPath:
      name: task_id
      in: path
      required: true
      schema:
        type: string
      description: Project orchestration task identifier.
    ProjectChangesetIdPath:
      name: changeset_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Project changeset identifier.
    CommitIdPath:
      name: commit_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Project commit identifier.
    AdvisoryIdPath:
      name: advisory_id
      in: path
      required: true
      schema:
        type: string
      description: Security advisory identifier.
    QueryIdPath:
      name: query_id
      in: path
      required: true
      schema:
        type: string
      description: Work saved query identifier.
    AfterSeqQuery:
      name: after_seq
      in: query
      description: Return events or materialized records with seq greater than this value.
      schema:
        type: integer
        minimum: 0
        default: 0
    LimitQuery:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50

  schemas:
    TokenRequest:
      type: object
      required: [api_key]
      properties:
        api_key:
          type: string
          description: API key used to issue a short-lived access token.

    TokenResponse:
      type: object
      required: [access_token, token_type, expires_at]
      properties:
        access_token:
          type: string
        token_type:
          type: string
          enum: [Bearer]
        expires_at:
          type: string
          format: date-time

    PrincipalType:
      type: string
      enum: [user, agent]

    User:
      type: object
      required: [id, username, display_name, principal_type, created_at]
      properties:
        id:
          type: string
        username:
          type: string
        display_name:
          type: string
        principal_type:
          $ref: "#/components/schemas/PrincipalType"
        agent_id:
          type: string
          description: Present when the current principal is an agent service token.
        created_at:
          type: string
          format: date-time

    UserSearchResult:
      type: object
      required: [id, email, display_name, created_at]
      properties:
        id:
          type: string
        email:
          type: string
        display_name:
          type: string
        created_at:
          type: string
          format: date-time

    ProjectRole:
      type: string
      enum: [owner, admin, member, viewer]

    Project:
      type: object
      required: [id, name, owner_id, visibility, status, created_at, updated_at]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        visibility:
          type: string
          enum: [private, public]
        topics:
          type: array
          description: >
            Local repository topic chips (not Work labels, not external-provider
            topics). Each is a trimmed string up to 50 characters; max 20 entries;
            deduplicated case-insensitively.
          items:
            type: string
            maxLength: 50
          maxItems: 20
        clone_source_project_id:
          type:
            - string
            - "null"
        owner_id:
          type: string
        status:
          type: string
          enum: [active, archived]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        branch:
          type: object
          description: Present when a branch-scoped file detail response is requested.
          properties:
            id:
              type: string
              format: uuid
            name:
              type: string
            head_commit_id:
              type:
                - string
                - "null"
              format: uuid
        branch_commit_id:
          type: string
          format: uuid
          description: Commit id used to resolve branch-scoped file content.
        revision:
          $ref: "#/components/schemas/ProjectFileRevision"

    ProjectCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
        description:
          type: string
          maxLength: 1024
        visibility:
          type: string
          enum: [private, public]
          default: private
        topics:
          type: array
          description: >
            Optional local repository topic chips supplied at creation time.
            Validated identically to PATCH: array of trimmed strings, max 20
            entries, max 50 characters each, duplicates collapsed
            case-insensitively, control characters rejected.
          items:
            type: string
            maxLength: 50
          maxItems: 20

    ProjectUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
        description:
          type: string
          maxLength: 1024
        visibility:
          type: string
          enum: [private, public]
        topics:
          type: array
          description: >
            Replace the project topic list. Must be an array of trimmed
            strings; max 20 entries; max 50 visible characters each;
            duplicates collapsed case-insensitively; empty strings and
            control characters rejected. Local-only metadata — not synced
            to any external provider.
          items:
            type: string
            maxLength: 50
          maxItems: 20
        status:
          type: string
          enum: [active, archived]

    ProjectTopicsResponse:
      type: object
      required: [topics]
      properties:
        topics:
          type: array
          description: Local repository topic chips.
          items:
            type: string
            maxLength: 50
          maxItems: 20

    ProjectTopicsUpdateRequest:
      type: object
      required: [topics]
      properties:
        topics:
          type: array
          description: |
            Replacement project topic list. Array of trimmed strings, max 20
            entries, max 50 characters each, duplicates collapsed
            case-insensitively, empty strings dropped, control characters
            rejected.
          items:
            type: string
            maxLength: 50
          maxItems: 20

    ProjectTopicsSearchResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          description: Distinct local repository topics visible to the caller.
          items:
            type: string
            maxLength: 50
        meta:
          type: object
          required: [total, limit, offset]
          properties:
            total:
              type: integer
            limit:
              type: integer
            offset:
              type: integer

    ProjectLanguagesResponse:
      type: object
      required: [languages, total_bytes, source, limitations]
      description: |
        Local-only, extension-based language breakdown. Files without a
        recognized extension (including most binaries) are omitted from the
        byte totals rather than guessed. The `source` and `limitations` fields
        make the estimate's scope explicit.
      properties:
        languages:
          type: object
          description: |
            Mapping from language display name to total bytes. Languages are
            sorted by byte count descending and then by name ascending for
            deterministic output.
          additionalProperties:
            type: integer
            minimum: 0
          example:
            TypeScript: 42100
            JavaScript: 8900
            CSS: 3400
        total_bytes:
          type: integer
          minimum: 0
          description: Sum of bytes for all recognized-language files.
        source:
          type: string
          enum: [project_files]
          description: Indicates that counts come from real Project Space files.
        limitations:
          type: array
          description: Honest limitations of the local estimate.
          items:
            type: string
          example:
            - extension-based local estimate
            - files without a recognized extension are omitted

    ProjectOrchestrationTask:
      type: object
      required:
        - id
        - project_id
        - orchestration_id
        - title
        - goal
        - status
        - assigned_agent_id
        - worker_task_path
        - worker_context_path
        - acceptance_criteria
        - depends_on
        - created_by_user_id
        - created_by_agent_id
        - created_at
        - updated_at
        - orchestration_title
        - orchestration_status
        - orchestration_base_path
        - orchestration_main_agent_id
        - labels
        - timeline
      properties:
        id:
          type: string
        project_id:
          type: string
        orchestration_id:
          type: string
        title:
          type: string
        goal:
          type: string
        status:
          type: string
          enum: [pending, dispatched, running, ready_for_review, approved, changes_requested, blocked, failed, cancelled]
        assigned_agent_id:
          type:
            - string
            - "null"
        worker_task_path:
          type: string
        worker_context_path:
          type: string
        result_path:
          type:
            - string
            - "null"
        evidence_path:
          type:
            - string
            - "null"
        acceptance_criteria:
          type: array
          items:
            type: string
        depends_on:
          type: array
          items:
            type: string
        review_notes:
          type:
            - string
            - "null"
        requested_changes:
          type:
            - string
            - "null"
        created_by_user_id:
          type:
            - string
            - "null"
        created_by_agent_id:
          type:
            - string
            - "null"
        dispatched_at:
          type: string
          format: date-time
          nullable: true
        claimed_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        reviewed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        md_artifacts:
          type: object
          additionalProperties:
            type: string
          nullable: true
        orchestration_title:
          type: string
        orchestration_status:
          type: string
        orchestration_base_path:
          type: string
        orchestration_main_agent_id:
          type:
            - string
            - "null"
        labels:
          type: array
          items:
            $ref: "#/components/schemas/TaskLabel"
        timeline:
          type: array
          items:
            $ref: "#/components/schemas/TaskTimelineEvent"

    TaskLabel:
      type: object
      required: [key, value]
      properties:
        key:
          type: string
          description: Machine-readable label identifier.
        value:
          oneOf:
            - type: string
            - type: boolean
          description: Derived label value.

    TaskTimelineEvent:
      type: object
      required: [type, at]
      properties:
        type:
          type: string
          description: Event type such as created, dispatched, claimed, completed, reviewed, review_linked, changeset_linked, or commit_linked.
        at:
          type: string
          format: date-time
          description: ISO timestamp of the event.
        actor_id:
          type:
            - string
            - "null"
          description: Id of the user or agent associated with the event, when known.
        detail:
          type: object
          additionalProperties: true
          description: Event-specific details such as decision or linked changeset/commit ids.

    ProjectOrchestrationTaskSummary:
      type: object
      required: [status_counts, tabs, total]
      properties:
        status_counts:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
        tabs:
          type: object
          required: [open, ready_for_review, blocked_failed, completed]
          properties:
            open:
              type: integer
              minimum: 0
            ready_for_review:
              type: integer
              minimum: 0
            blocked_failed:
              type: integer
              minimum: 0
            completed:
              type: integer
              minimum: 0
        total:
          type: integer
          minimum: 0
        assignees:
          type: array
          description: Bounded list of assignees with lifecycle counts, scoped to the same filters and caller visibility.
          items:
            type: object
            required: [assigned_agent_id, display_name, total, open, review, done]
            properties:
              assigned_agent_id:
                type: string
                nullable: true
              display_name:
                type: string
              total:
                type: integer
                minimum: 0
              open:
                type: integer
                minimum: 0
              review:
                type: integer
                minimum: 0
              done:
                type: integer
                minimum: 0
        orchestrations:
          type: array
          description: Bounded list of orchestrations with task totals, scoped to the same filters and caller visibility.
          items:
            type: object
            required: [orchestration_id, title, total]
            properties:
              orchestration_id:
                type: string
              title:
                type: string
              total:
                type: integer
                minimum: 0
        batches:
          type: array
          description: Bounded list of local orchestration batches with lifecycle counts and date bounds, scoped to the same filters and caller visibility.
          items:
            type: object
            required: [batch_key, batch_label, orchestration_id, total, open, review, blocked_failed, completed, first_created_at, last_updated_at]
            properties:
              batch_key:
                type: string
              batch_label:
                type: string
              orchestration_id:
                type: string
              total:
                type: integer
                minimum: 0
              open:
                type: integer
                minimum: 0
              review:
                type: integer
                minimum: 0
              blocked_failed:
                type: integer
                minimum: 0
              completed:
                type: integer
                minimum: 0
              first_created_at:
                type: string
                format: date-time
              last_updated_at:
                type: string
                format: date-time
        timeline:
          type: array
          description: Bounded list of date buckets derived from visible task timestamps, scoped to the same filters and caller visibility.
          items:
            type: object
            required: [date, created, updated, completed, review_ready]
            properties:
              date:
                type: string
                format: date
              created:
                type: integer
                minimum: 0
              updated:
                type: integer
                minimum: 0
              completed:
                type: integer
                minimum: 0
              review_ready:
                type: integer
                minimum: 0

    ProjectOrchestrationTaskListResponse:
      type: object
      required: [data, total, limit, offset, summary]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/ProjectOrchestrationTask"
        total:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
        offset:
          type: integer
          minimum: 0
        summary:
          $ref: "#/components/schemas/ProjectOrchestrationTaskSummary"

    WorkSavedQueryFilter:
      type: object
      description: |
        Bounded set of filters supported by Project Space Work saved queries.
        Only the keys listed here are accepted; any other field is rejected.
      properties:
        status:
          type: array
          description: |
            Task status values or status groups. Supported groups are open,
            review, blocked, done. Supported statuses are pending, dispatched,
            running, ready_for_review, approved, changes_requested, blocked,
            failed, cancelled.
          items:
            type: string
        saved_view:
          type: string
          description: Built-in saved view key.
          enum: [my_open, review, has_artifacts, linked, blocked]
        search:
          type: string
          description: Case-insensitive search term for task title, goal, or orchestration title.
          maxLength: 255
        agent:
          type: string
          description: Filter by assigned agent id.
        has_artifacts:
          type: boolean
          description: Filter tasks that have result, evidence, or worker artifact paths.
        has_links:
          type: boolean
          description: Filter tasks with related changesets or commits.
        has_blockers:
          type: boolean
          description: Filter tasks in blocked or failed status.

    WorkSavedQuery:
      type: object
      required:
        - id
        - project_id
        - name
        - description
        - scope
        - query
        - created_by
        - updated_by
        - created_at
        - updated_at
      properties:
        id:
          type: string
        project_id:
          type: string
        name:
          type: string
          maxLength: 128
        description:
          type:
            - string
            - "null"
          maxLength: 2000
        scope:
          type: string
          enum: [work]
          description: Fixed to work/orchestration tasks scope.
        query:
          $ref: "#/components/schemas/WorkSavedQueryFilter"
        created_by:
          type: string
        updated_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    WorkSavedQueryCreate:
      type: object
      required: [name, query]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
        description:
          type:
            - string
            - "null"
          maxLength: 2000
        query:
          $ref: "#/components/schemas/WorkSavedQueryFilter"

    WorkSavedQueryUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 128
        description:
          type:
            - string
            - "null"
          maxLength: 2000
        query:
          $ref: "#/components/schemas/WorkSavedQueryFilter"

    WorkSavedQueryListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/WorkSavedQuery"

    ProjectOverview:
      type: object
      required:
        - project
        - summary
        - attention
        - recent
        - workload
        - health
        - generated_at
      properties:
        project:
          type: object
          required: [id, name, description, visibility, topics]
          properties:
            id:
              type: string
            name:
              type: string
            description:
              type:
                - string
                - "null"
            visibility:
              type: string
              enum: [private, public]
            topics:
              type: array
              items:
                type: string
        summary:
          type: object
          required: [agents, orchestrations, tasks, files, inbox]
          properties:
            agents:
              type: object
              required: [total, online, stale, offline]
              properties:
                total:
                  type: integer
                  minimum: 0
                online:
                  type: integer
                  minimum: 0
                stale:
                  type: integer
                  minimum: 0
                offline:
                  type: integer
                  minimum: 0
            orchestrations:
              type: object
              required: [total]
              properties:
                total:
                  type: integer
                  minimum: 0
              additionalProperties:
                type: integer
                minimum: 0
            tasks:
              type: object
              required: [total, open_work, ready_for_review, blocked_failed]
              properties:
                total:
                  type: integer
                  minimum: 0
                open_work:
                  type: integer
                  minimum: 0
                ready_for_review:
                  type: integer
                  minimum: 0
                blocked_failed:
                  type: integer
                  minimum: 0
              additionalProperties:
                type: integer
                minimum: 0
            files:
              type: object
              required: [total_count, recent_count]
              properties:
                total_count:
                  type: integer
                  minimum: 0
                recent_count:
                  type: integer
                  minimum: 0
            inbox:
              type: object
              required: [pending_total, unacked_total]
              properties:
                pending_total:
                  type: integer
                  minimum: 0
                unacked_total:
                  type: integer
                  minimum: 0
        attention:
          type: object
          required: [ready_for_review, blocked_failed, stale_inbox]
          properties:
            ready_for_review:
              type: array
              items:
                $ref: "#/components/schemas/ProjectOverviewTaskAttentionItem"
            blocked_failed:
              type: array
              items:
                $ref: "#/components/schemas/ProjectOverviewTaskAttentionItem"
            stale_inbox:
              type: array
              items:
                $ref: "#/components/schemas/ProjectOverviewInboxAttentionItem"
        recent:
          type: object
          required: [orchestrations, files]
          properties:
            orchestrations:
              type: array
              items:
                $ref: "#/components/schemas/ProjectOverviewRecentOrchestration"
            files:
              type: array
              items:
                $ref: "#/components/schemas/ProjectOverviewRecentFile"
        workload:
          type: object
          required: [total_units, reviewed_units, total_final_work_units]
          properties:
            total_units:
              type: integer
              minimum: 0
            reviewed_units:
              type: integer
              minimum: 0
            total_final_work_units:
              type: number
              minimum: 0
        health:
          type: object
          required: [signals]
          properties:
            signals:
              type: array
              items:
                $ref: "#/components/schemas/ProjectOverviewHealthSignal"
        generated_at:
          type: string
          format: date-time

    ProjectOverviewTaskAttentionItem:
      type: object
      required: [task_id, orchestration_id, title, status, assigned_agent_id, updated_at]
      properties:
        task_id:
          type: string
        orchestration_id:
