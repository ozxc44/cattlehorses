    get:
      operationId: listProjectSecurityAdvisories
      tags: [Security]
      summary: List project security advisories.
      description: |
        Returns a paginated list of security advisories for the project. List
        records are summaries and omit the `body` and `references` fields.
        This endpoint manages metadata only; vulnerability scanning, dependency
        analysis, import, delete, and auto-fix workflows are not implemented.
      parameters:
        - name: severity
          in: query
          schema:
