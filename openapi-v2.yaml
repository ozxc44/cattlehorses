  /v1/projects/{pid}/owner-transfer:
    parameters:
      - $ref: "#/components/parameters/PidPath"
    post:
      operationId: transferProjectOwner
      tags: [Members]
      summary: Transfer project ownership.
      description: |
        Transfers ownership from the current owner to an existing project member.
        The caller must be the current owner and must confirm the exact project
        name. The previous owner remains a project admin, the target becomes
        the single owner, and an `owner_transferred` audit event is recorded.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectOwnerTransferRequest"
      responses:
        "200":
          description: Ownership transferred.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectOwnerTransferResponse"
        "403":
          description: Only the current owner may transfer project ownership.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Project or target member not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Project owner membership is inconsistent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid target user or project-name confirmation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{pid}/archive:
    parameters:
      - $ref: "#/components/parameters/PidPath"
    post:
      operationId: archiveProject
      tags: [Projects]
      summary: Archive a project.
      description: |
        Marks the project as archived. Owner/admin only. Requires exact project
        name confirmation. A `project_archived` audit event is recorded.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectArchiveActionRequest"
      responses:
        "200":
          description: Project archived.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Project name confirmation does not match.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{pid}/unarchive:
    parameters:
      - $ref: "#/components/parameters/PidPath"
    post:
      operationId: unarchiveProject
      tags: [Projects]
      summary: Unarchive a project.
      description: |
        Restores an archived project to active status. Owner/admin only. Requires
        exact project name confirmation. A `project_unarchived` audit event is recorded.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectArchiveActionRequest"
      responses:
        "200":
          description: Project unarchived.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Project name confirmation does not match.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{pid}/audit-events:
    parameters:
      - $ref: "#/components/parameters/PidPath"
    get:
      operationId: listProjectAuditEvents
      tags: [Activity]
      summary: List recent project audit events.
      description: Returns project-scoped audit entries including member management events (add, role-change, removal), settings changes, and module events (wiki, releases, packages, security). Requires project view permission.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of rows to skip before returning results.
        - in: query
          name: action
          schema:
            type: string
          description: Filter audit events by action value. Only valid when the value matches the ProjectAuditEvent action enum.
        - in: query
          name: q
          schema:
            type: string
          description: Free-text search across action, actor/target display names and emails, and non-sensitive metadata values.
      responses:
        "200":
          description: Audit events ordered by created_at descending.
          content:
            application/json:
              schema:
                type: object
                required: [data, total, limit, offset]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProjectAuditEvent"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{pid}/tags:
    parameters:
      - $ref: "#/components/parameters/PidPath"
    get:
      operationId: listProjectTags
      tags: [Versioning]
      summary: List release-backed project tags.
      description: |
        Returns a read-only tag surface derived from project releases. This
        endpoint does not create or delete Git tags; it exposes release tag
        names and the target commit summary when that commit exists locally.
      parameters:
        - in: query
          name: skip
          schema:
            type: integer
            minimum: 0
            default: 0
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
      responses:
        "200":
          description: Release-backed tags ordered by release recency.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectTagsListResponse"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{pid}/webhook-deliveries:
    parameters:
      - $ref: "#/components/parameters/PidPath"
    get:
      operationId: listProjectWebhookDeliveries
      tags: [Activity]
      summary: List project webhook delivery history.
      description: |
        Returns a bounded, read-only history of outbound webhook delivery attempts
        for the project. Results are sorted newest first. The response never
        includes the webhook secret, raw request/response bodies, or an unmasked
        webhook URL. Requires project view permission.
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of rows to skip before returning results.
        - in: query
          name: status
          schema:
            type: string
            enum: [success, failed, retrying, dead_letter]
          description: Filter delivery history by status.
      responses:
        "200":
          description: Webhook delivery history ordered by created_at descending.
          content:
            application/json:
              schema:
                type: object
                required: [data, total, limit, offset]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProjectWebhookDelivery"
                  total:
                    type: integer
                  limit:
                    type: integer
                  offset:
                    type: integer
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{pid}/audit-events/compliance:
    parameters:
      - $ref: "#/components/parameters/PidPath"
    get:
      operationId: getProjectAuditComplianceSummary
      tags: [Activity]
      summary: Get project audit compliance summary.
      description: Returns real project-scoped audit aggregates, export/redaction policy information, retention policy state, and local-only hash-chain attestation status. Requires project view permission. This endpoint does not perform retention deletion or claim external/legal-grade immutable attestation.
      responses:
        "200":
          description: Audit compliance summary derived from project audit events.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectAuditComplianceSummary"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{pid}/audit-events/attestation:
    parameters:
      - $ref: "#/components/parameters/PidPath"
    get:
      operationId: getProjectAuditAttestation
      tags: [Activity]
      summary: Verify the local project audit hash chain.
      description: Returns local-only SHA-256 hash-chain verification for project audit events. Requires project view permission. This is not external notarization, legal-grade immutability, blockchain anchoring, or automated compliance scanning.
      responses:
        "200":
          description: Local audit attestation state.
          content:
            application/json:
              schema:
                type: object
                required: [project_id, immutable_attestation]
                properties:
                  project_id:
                    type: string
                    format: uuid
                  immutable_attestation:
                    $ref: "#/components/schemas/ProjectAuditComplianceSummary/properties/immutable_attestation"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{pid}/audit-events/compliance-policy:
    parameters:
      - $ref: "#/components/parameters/PidPath"
    patch:
      operationId: updateProjectAuditCompliancePolicy
      tags: [Activity]
      summary: Configure project audit retention policy and legal hold.
      description: Owner/admin endpoint to set or clear audit retention days and toggle legal hold. Requires owner or admin role. Viewers, members, and outsiders are denied with 403.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompliancePolicyUpdateRequest"
      responses:
        "200":
          description: Updated audit compliance policy.
          content:
            application/json:
              schema:
                type: object
                required: [project_id, retention_policy, legal_hold]
                properties:
                  project_id:
                    type: string
                    format: uuid
                  retention_policy:
                    type: object
                    required: [configured, retention_days, status]
                    properties:
                      configured:
                        type: boolean
                      retention_days:
                        type: integer
                        nullable: true
                      status:
                        type: string
                        enum: [not_configured, active, blocked_by_legal_hold]
                  legal_hold:
                    type: object
                    required: [enabled, status]
                    properties:
                      enabled:
                        type: boolean
                      status:
                        type: string
                        enum: [enabled, disabled]
        "403":
          description: Insufficient permissions (viewer, member, or outsider).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid retention_days or legal_hold_enabled value.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /v1/projects/{pid}/audit-events/retention-prune:
    parameters:
      - $ref: "#/components/parameters/PidPath"
    post:
      operationId: pruneProjectAuditEvents
      tags: [Activity]
      summary: Prune project audit events older than the configured retention cutoff.
      description: Owner/admin endpoint to delete audit events older than the configured retention policy. Blocked when legal hold is enabled or when no retention policy is configured. The prune action itself is recorded as an audit event with safe metadata (no raw data exposure). Requires owner or admin role.
      responses:
        "200":
          description: Prune completed.
          content:
            application/json:
              schema:
                type: object
                required: [project_id, retention_days, cutoff_at, pruned_count, legal_hold_enabled]
                properties:
                  project_id:
                    type: string
                    format: uuid
                  pruned_count:
                    type: integer
                    minimum: 0
                    description: Number of audit events pruned.
                  cutoff_at:
                    type: string
                    format: date-time
                    description: Date threshold used for the prune operation.
                  retention_days:
                    type: integer
                    description: Retention days in effect at prune time.
                  legal_hold_enabled:
                    type: boolean
                    enum: [false]
                    description: Legal hold state at prune completion.
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: No retention policy configured or legal hold blocks prune.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{pid}/audit-events/export:
    parameters:
      - $ref: "#/components/parameters/PidPath"
    get:
      operationId: exportProjectAuditEvents
      tags: [Activity]
      summary: Export project audit events.
      description: Returns project-scoped audit entries as a JSON array or CSV file. Honors the same action, q, limit, and offset filters as the list endpoint. Metadata is redacted for sensitive keys before export. Requires project view permission.
      parameters:
        - in: query
          name: format
          required: true
          schema:
            type: string
            enum: [json, csv]
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 1000
            default: 100
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of matching rows to skip before exporting.
        - in: query
          name: action
          schema:
            type: string
          description: Filter exported audit events by action value.
        - in: query
          name: q
          schema:
            type: string
          description: Free-text search across action, actor/target display names and emails, and non-sensitive metadata values.
      responses:
        "200":
          description: |
            Exported audit events. JSON responses use `application/json` with
            `Content-Disposition: attachment`; CSV responses use `text/csv`.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectAuditEvent"
            text/csv:
              schema:
                type: string
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid or missing export format.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{pid}/files:
    parameters:
      - $ref: "#/components/parameters/PidPath"
    get:
      operationId: listProjectFiles
      tags: [Project Space]
      summary: List Markdown-driven project files.
      description: |
        Returns a paginated list of project files. The default shape is a flat
        list of file summaries. When `view=children` is provided, the endpoint
        returns a server-backed directory listing with synthetic child
        directories and paginated direct files for the requested `path_prefix`
        (root when omitted). This avoids client-side caps for deep trees.

        When `exact_path` is provided, the endpoint performs an exact-path
        lookup within the project and returns either one matching file summary
        or an empty list. In this mode `exact_path` takes precedence over `q`,
        `path_prefix`, and `view=children` to avoid surprising broad searches;
        the response still uses the standard flat list shape `{ data, total,
        limit, offset, path_prefix }` with `path_prefix` set to `null`.
      parameters:
        - name: branch
          in: query
          schema:
            type: string
          description: |
            Scope results to a branch by name or id. When the branch has a head
            commit, only files present in that commit snapshot are returned.
            Unknown branch returns `404`. When omitted, the default live file
            table is used (backward-compatible).
        - name: path_prefix
          in: query
          schema:
            type: string
          description: |
            Return files whose path starts with this prefix. In `children` view
            this is the directory to list; the trailing slash is optional and
            normalized by the server.
        - name: exact_path
          in: query
          schema:
            type: string
          description: |
            Exact project path to look up. Must follow the same project-path
            rules as file writes (relative, no `..`, no empty segments). If
            provided, it takes precedence over other filters and returns at most
            one matching file in the standard flat list response.
        - name: q
          in: query
          schema:
            type: string
          description: |
            Optional path substring search. In default view the flat list is
            filtered by path. In `children` view the search is global within the
            project and returns only matching files (no synthetic directories).
        - name: view
          in: query
          schema:
            type: string
            enum: [flat, children]
            default: flat
          description: |
            `flat` returns the standard paginated file list. `children` returns
            a directory-oriented response with `directories` and `files`.
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Maximum number of files to return per page.
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of files to skip before returning results.
      responses:
        "200":
          description: Project files (flat or children view).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ProjectFileList"
                  - $ref: "#/components/schemas/ProjectFileChildrenList"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Branch not found (when `branch` query parameter references a non-existent branch).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid exact_path.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: upsertProjectFile
      tags: [Project Space]
      summary: Create or update a project file and append a revision.
      description: |
        Creates a new project file, or updates an existing file when
        `base_revision_id` matches the file's `current_revision_id`. This is the
        backend contract for the inline editor save action in Project Space.

        - Owner, admin, and member can save changes to an existing file.
        - Viewer, outsider, or anonymous callers are rejected.
        - Updating an existing file without `base_revision_id` returns `422`.
        - A stale `base_revision_id` returns `409` with the current revision id.
        - Direct writes are blocked when the default branch has
          `block_direct_writes` enabled, unless the caller matches an existing
          bypass role or user-id rule.
        - The response includes the updated file and the new revision so the UI
          can refresh `current_revision_id`, `content_hash`, and revision number.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectFileWrite"
      responses:
        "200":
          description: Existing file updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectFileUpsertResponse"
        "201":
          description: File created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectFileUpsertResponse"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions (viewer/outsider) or agent path restriction violated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: |
            Base revision conflict, or direct writes are blocked by branch
            protection rules. The body includes `current_revision_id` for
            conflicts and `rule: block_direct_writes` for protection blocks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: File content exceeds the maximum allowed size.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid path/content or missing `base_revision_id` for an existing file.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{pid}/files/upload:
    parameters:
      - $ref: "#/components/parameters/PidPath"
    post:
      operationId: uploadProjectFiles
      tags: [Project Space]
      summary: Upload one or more files as base64-encoded content.
      description: |
        Browser-friendly batch upload for Project Space files. Each file is
        supplied as a relative path, a base64-encoded `content_base64` payload,
        and an optional MIME type. Uploaded files follow the same
        `ProjectFile` + `ProjectFileRevision` storage model as `POST /files`,
        including content hash, size bytes, and updated actor.

        - Owner, admin, and member can upload files.
        - Viewer, outsider, or anonymous callers are rejected.
        - Agents may only upload files under `deliverables/`.
        - Updating an existing file requires `base_revision_id` matching the
          file's `current_revision_id`; a stale value returns `409`.
        - Direct writes are blocked when the default branch has
          `block_direct_writes` enabled, unless the caller matches a bypass rule.
        - The request is atomic: any validation failure or conflict aborts the
          entire batch.
        - Binary content types are stored so that raw/download endpoints can
          return the original bytes with the supplied content type.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectFileUploadBatch"
      responses:
        "201":
          description: All files uploaded successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectFileUploadResponse"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions or agent path restriction violated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: |
            Base revision conflict, duplicate path in the batch, or direct writes
            are blocked by branch protection rules.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: File content or batch size exceeds limits.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: |
            Invalid request shape, unsafe/empty path, malformed base64, or missing
            `base_revision_id` for an existing file.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{pid}/files/search:
    parameters:
      - $ref: "#/components/parameters/PidPath"
    get:
      operationId: searchProjectFiles
      tags: [Project Space]
      summary: Search project files by path or local text content.
      description: |
        Performs a bounded, literal, case-insensitive local search over file
        paths and stored text content. Results include stable file ids and up to
        three bounded line snippets for content matches. When `branch` is
        provided, search is scoped to the branch HEAD snapshot and returns the
        captured file revision rather than later live content. This endpoint is
        not a semantic/vector search and does not call external search services.
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 2
            maxLength: 120
          description: Literal query to match against path or file content.
        - name: branch
          in: query
          schema:
            type: string
          description: Optional branch name or id to scope search to a branch HEAD snapshot.
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Bounded search results.
          content:
            application/json:
              schema:
                type: object
                required: [data, total, limit, offset, q]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ProjectFileSearchResult"
                  total:
                    type: integer
                    minimum: 0
                  limit:
                    type: integer
                  offset:
                    type: integer
                    minimum: 0
                  q:
                    type: string
                  branch:
                    type: object
                    nullable: true
                    properties:
                      id:
                        type: string
                        format: uuid
                      name:
                        type: string
                      head_commit_id:
                        type: string
                        format: uuid
                        nullable: true
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Branch not found (when `branch` references a non-existent branch).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid query.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{pid}/files/{file_id}:
    parameters:
      - $ref: "#/components/parameters/PidPath"
      - $ref: "#/components/parameters/FileIdPath"
    get:
      operationId: getProjectFile
      tags: [Project Space]
      summary: Get a project file with current or branch-scoped content.
      description: |
        Returns the file detail. When the `branch` query parameter is provided,
        the endpoint resolves the branch snapshot and returns the revision
        content captured at the branch HEAD commit, along with branch metadata.
        Without `branch`, returns the current live file (backward-compatible).
      parameters:
        - name: branch
          in: query
          schema:
            type: string
          description: |
            Scope to a branch by name or id. When the branch has a head commit,
            the file must be present in that commit snapshot; its revision
            content is returned instead of the live file. If the file is not in
            the snapshot, `404` is returned. For `main` with no head commit,
            falls back to the live file. Unknown branch returns `404`.
      responses:
        "200":
          description: Project file (live or branch-scoped revision).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ProjectFile"
                  - type: object
                    description: Branch-scoped revision with file and branch metadata.
                    properties:
                      id:
                        type: string
                        format: uuid
                        description: File id.
                      project_id:
                        type: string
                        format: uuid
                      path:
                        type: string
                      content_type:
                        type: string
                      content_hash:
                        type: string
                      size_bytes:
                        type: integer
                      current_revision_id:
                        type: string
                        format: uuid
                        description: The snapshot revision id (not the live current revision).
                      updated_by:
                        type: string
                        nullable: true
                      updated_at:
                        type: string
                        format: date-time
                      content:
                        type: string
                        description: Revision content from the branch snapshot.
                      created_by:
                        type: string
                        nullable: true
                      created_at:
                        type: string
                        format: date-time
                      branch:
                        type: object
                        properties:
                          id:
                            type: string
                            format: uuid
                          name:
                            type: string
                          head_commit_id:
                            type: string
                            format: uuid
                            nullable: true
                      branch_commit_id:
                        type: string
                        format: uuid
                        description: The commit id this revision was resolved from.
                      revision:
                        type: object
                        description: Full revision metadata.
                        properties:
                          id:
                            type: string
                            format: uuid
                          project_id:
                            type: string
                            format: uuid
                          file_id:
                            type: string
                            format: uuid
                          path:
                            type: string
                          revision_number:
                            type: integer
                          content:
                            type: string
                          content_type:
                            type: string
                          content_hash:
                            type: string
                          message:
                            type: string
                            nullable: true
                          created_by:
                            type: string
                            nullable: true
                          created_at:
                            type: string
                            format: date-time
        "404":
          description: File not found, or not present in branch snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: renameProjectFile
      tags: [Project Space]
      summary: Rename a project file to a new path.
      description: |
        Moves a live project file to a new relative path while preserving its
        file id and revision history. Requires `base_revision_id` as a
        stale-write guard. The source file must exist and not be deleted; the
        target path must not already be occupied by another live file. Direct
        renames are subject to the same branch protection rules and agent path
        restrictions as file upserts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectFileRename"
      responses:
        "200":
          description: File renamed successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectFileRenameResponse"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions or agent path restriction violated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: File not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: |
            Base revision conflict, target path already exists, or direct writes
            are blocked by branch protection rules.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Invalid target path or missing `base_revision_id`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteProjectFile
      tags: [Project Space]
      summary: Delete a project file with stale-write protection.
      description: |
        Soft-deletes a live project file. Requires `base_revision_id` as a
        stale-write guard. Deleted files disappear from list/search/detail views
        but historical revisions remain. Direct deletes are subject to the same
        branch protection rules and agent path restrictions as file upserts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectFileDelete"
      responses:
        "200":
          description: File deleted successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectFileDeleteResponse"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions or agent path restriction violated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: File not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: |
            Base revision conflict or direct writes are blocked by branch
            protection rules.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Missing `base_revision_id`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{pid}/files/{file_id}/raw:
    parameters:
      - $ref: "#/components/parameters/PidPath"
      - $ref: "#/components/parameters/FileIdPath"
    get:
      operationId: getProjectFileRaw
      tags: [Project Space]
      summary: Read a project file as raw text/body.
      description: |
        Returns the file content as a raw body from the local Project Space
        store. When `revision_id` is provided, the response returns that exact
        historical revision. Otherwise, when `branch` is provided, the content
        is resolved from the branch HEAD snapshot. When `download=1` is
        provided, the response includes `Content-Disposition: attachment` so the
        client treats it as a download.
      parameters:
        - name: revision_id
          in: query
          schema:
            type: string
            format: uuid
          description: |
            Exact file revision to return. This takes precedence over `branch`
            and returns `404` when the revision does not belong to the requested
            file/project.
        - name: branch
          in: query
          schema:
            type: string
          description: |
            Scope to a branch by name or id. When the branch has a head commit,
            the file must be present in that commit snapshot; its revision
            content is returned instead of the live file. Unknown branch returns
            `404`.
        - name: download
          in: query
          schema:
            type: string
            enum: ['1', 'true']
          description: |
            When `1` or `true`, set `Content-Disposition: attachment` so the
            file is downloaded instead of displayed inline.
      responses:
        "200":
          description: Raw file content.
          content:
            text/plain:
              schema:
                type: string
            text/markdown:
              schema:
                type: string
            application/json:
              schema:
                type: string
          headers:
            Content-Disposition:
              schema:
                type: string
              description: |
                Present when `download=1`, set to `attachment; filename="<basename>"`.
            X-Project-File-Path:
              schema:
                type: string
              description: The project-relative path of the returned file.
            X-Project-File-Revision-Id:
              schema:
                type: string
              description: The revision id of the returned content, when known.
            X-Project-Branch:
              schema:
                type: string
              description: The branch name, when branch-scoped.
            X-Project-Branch-Commit-Id:
              schema:
                type: string
              description: The branch HEAD commit id, when branch-scoped.
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: File not found, not present in branch snapshot, or branch not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{pid}/files/{file_id}/blame:
    parameters:
      - $ref: "#/components/parameters/PidPath"
      - $ref: "#/components/parameters/FileIdPath"
    get:
      operationId: getProjectFileBlame
      tags: [Project Space]
      summary: Read local Project Space line attribution for a file.
      description: |
        Returns line-level attribution derived from stored ProjectFileRevision
        rows. This is a local Project Space blame model, not Git blame: it
        attributes each line to the latest bounded revision where the same
        line-position content appeared, and is not rename-aware or move-aware.
        When `revision_id` is provided, the response is bounded to that exact
        historical revision. Otherwise, when `branch` is provided, the response
        is resolved from the branch HEAD snapshot. Unknown branch, unknown
        revision, or a file missing from a branch snapshot returns `404`.
      parameters:
        - name: revision_id
          in: query
          schema:
            type: string
            format: uuid
          description: Exact file revision to attribute. Takes precedence over `branch`.
        - name: branch
          in: query
          schema:
            type: string
          description: Scope attribution to a branch by name or id.
      responses:
        "200":
          description: Local line attribution for the requested file content.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: "#/components/schemas/ProjectFileBlameResponse"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: File not found, not present in branch snapshot, branch not found, or revision not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{pid}/files/{file_id}/download:
    parameters:
      - $ref: "#/components/parameters/PidPath"
      - $ref: "#/components/parameters/FileIdPath"
    get:
      operationId: downloadProjectFile
      tags: [Project Space]
      summary: Download a project file as an attachment.
      description: |
        Returns the file content with `Content-Disposition: attachment` so the
        client treats it as a download. Supports the same `branch` semantics as
        the raw endpoint, and supports `revision_id` for exact historical
        revision downloads.
      parameters:
        - name: revision_id
          in: query
          schema:
            type: string
            format: uuid
          description: |
            Exact file revision to download. This takes precedence over
            `branch` and returns `404` when the revision does not belong to the
            requested file/project.
        - name: branch
          in: query
          schema:
            type: string
          description: |
            Scope to a branch by name or id. When the branch has a head commit,
            the file must be present in that commit snapshot; its revision
            content is returned instead of the live file. Unknown branch returns
            `404`.
      responses:
        "200":
          description: File content as an attachment.
          content:
            text/plain:
              schema:
                type: string
            text/markdown:
              schema:
                type: string
            application/json:
              schema:
                type: string
          headers:
            Content-Disposition:
              schema:
                type: string
              description: |
                Always set to `attachment; filename="<basename>"`.
            X-Project-File-Path:
              schema:
                type: string
              description: The project-relative path of the returned file.
            X-Project-File-Revision-Id:
              schema:
                type: string
              description: The revision id of the returned content, when known.
            X-Project-Branch:
              schema:
                type: string
              description: The branch name, when branch-scoped.
            X-Project-Branch-Commit-Id:
              schema:
                type: string
              description: The branch HEAD commit id, when branch-scoped.
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: File not found, not present in branch snapshot, or branch not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{pid}/files/{file_id}/revisions:
    parameters:
      - $ref: "#/components/parameters/PidPath"
