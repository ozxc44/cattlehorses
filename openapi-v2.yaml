          description: Session not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createSessionMessage
      tags: [Sessions]
      summary: Create a message and append a message.created event.
      description: |
        Empty `recipient_participant_ids` broadcasts. Non-empty values target
        specific participants. `visibility=direct` restricts read access to the
        sender, recipients, owner, and admin. `dispatch_ttl=0` prevents runtime
        dispatch.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMessageRequest"
      responses:
        "201":
          description: Message created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Session or participant not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Duplicate idempotency key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /v1/sessions/{sid}/events:
    parameters:
      - $ref: "#/components/parameters/SidPath"
    get:
      operationId: listSessionEvents
      tags: [Events]
      summary: Replay session events.
      parameters:
        - $ref: "#/components/parameters/AfterSeqQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Events ordered by seq ascending.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EventEnvelope"
        "404":
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/sessions/{sid}/stream:
    parameters:
      - $ref: "#/components/parameters/SidPath"
    get:
      operationId: streamSessionEvents
      tags: [Events]
      summary: Stream session events through SSE.
      description: |
        Opens an SSE connection. Each `data` line contains a JSON-encoded
        `EventEnvelope`. Use `after_seq` to replay events with `seq` greater
        than the provided value before following live events.
      parameters:
        - $ref: "#/components/parameters/AfterSeqQuery"
      responses:
        "200":
          description: SSE stream of EventEnvelope objects.
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/EventEnvelope"
        "404":
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/health:
    get:
      operationId: getHealth
      tags: [Health]
      summary: Read system, project, or agent health.
      parameters:
        - name: project_id
          in: query
          schema:
            type: string
          description: Optional project filter.
        - name: agent_id
          in: query
          schema:
            type: string
          description: Optional agent filter.
      responses:
        "200":
          description: Health snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthSnapshot"
        "403":
          description: Insufficient permissions for requested project or agent filter.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/debug/logs:
    get:
      operationId: listDebugLogs
      tags: [Debug]
      summary: Read recent NAS/LAN JSONL debug log entries.
      description: Operator-only endpoint. Enable with `DEBUG_LOG_API_ENABLED=true` and protect with `DEBUG_LOG_API_TOKEN`.
      security:
        - DebugTokenAuth: []
      parameters:
        - name: lines
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 2000
            default: 200
          description: Maximum number of matching recent entries to return.
        - name: level
          in: query
          schema:
            type: string
            enum: [debug, info, warn, error]
        - name: request_id
          in: query
          schema:
            type: string
        - name: agent_id
          in: query
          schema:
            type: string
        - name: project_id
          in: query
          schema:
            type: string
        - name: since
          in: query
          schema:
            type: string
            format: date-time
        - name: status
          in: query
          schema:
            type: integer
            minimum: 100
            maximum: 599
          description: Exact HTTP status code.
        - name: status_min
          in: query
          schema:
            type: integer
            minimum: 100
            maximum: 599
        - name: status_max
          in: query
          schema:
            type: integer
            minimum: 100
            maximum: 599
        - name: status_class
          in: query
          schema:
            type: string
            enum: [1xx, 2xx, 3xx, 4xx, 5xx]
        - name: min_duration_ms
          in: query
          schema:
            type: integer
            minimum: 0
          description: Return entries whose `duration_ms` is at least this value.
        - name: path
          in: query
          schema:
            type: string
          description: Exact request path, for example `/v1/projects`.
        - name: format
          in: query
          schema:
            type: string
            enum: [json, ndjson]
            default: json
      responses:
        "200":
          description: Matching recent log entries.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebugLogListResponse"
            application/x-ndjson:
              schema:
                type: string
        "401":
          description: Missing or invalid debug token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Debug log API disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Debug log API token not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/debug/logs/config:
    get:
      operationId: getDebugLogConfig
      tags: [Debug]
      summary: Read active JSONL debug log configuration.
      security:
        - DebugTokenAuth: []
      responses:
        "200":
          description: Active debug log settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DebugLogConfigResponse"
        "401":
          description: Missing or invalid debug token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Debug log API disabled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Debug log API token not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/agents/{aid}/health:
    parameters:
      - $ref: "#/components/parameters/AidPath"
    post:
      operationId: postAgentHealth
      tags: [Health]
      summary: Report health for an agent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HealthReportRequest"
      responses:
        "202":
          description: Health report accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthSnapshot"
        "403":
          description: Agent token cannot report for another agent.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Agent not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "422":
          description: Validation error.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationError"

  /v1/agents/heartbeat:
    post:
      operationId: postAgentHeartbeat
      tags: [Health]
      summary: Refresh an agent online presence heartbeat.
      description: Agents should call this every 30 seconds while online. Orchestration assignment requires a fresh heartbeat.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentHeartbeatRequest"
      responses:
        "200":
          description: Heartbeat accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentHeartbeatResponse"
        "401":
          description: Missing or invalid agent API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/agent/projects:
    get:
      operationId: discoverAgentProjects
      tags: [Agent Runtime]
      summary: Discover projects the authenticated agent belongs to.
      description: Returns project metadata, the agent's role, and online/dispatchable status for each project. Agents use this on startup to determine which project context applies.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Agent project list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AgentProjectDiscovery"
        "401":
          description: Missing or invalid agent API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/agent/inbox:
    get:
      operationId: listAgentInbox
      tags: [Agent Runtime]
      summary: List durable inbox items for the authenticated agent.
      description: |
        Agents poll this endpoint to discover completed, failed, or blocked task
        notifications from worker agents, as well as review requests and system
        notifications. This is the primary mechanism for a main agent to learn
        about worker results — agents do not rely on social chat for workflow
        coordination.

        Items are ordered by created_at descending (most recent first). Use
        `status` to filter by lifecycle state.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: unread
          in: query
          schema:
            type: string
          description: 'Set to `true` to return only unread items.'
        - name: status
          in: query
          schema:
            type: string
            enum: [unread, read, acked]
          description: Filter by inbox lifecycle status.
        - name: event_type
          in: query
          schema:
            type: string
          description: Filter by event type string.
        - name: since
          in: query
          schema:
            type: string
            format: date-time
          description: Return items created after this timestamp.
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
          description: Maximum number of items to return (max 200).
      responses:
        "200":
          description: Inbox list with summary meta.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboxListResponse"
        "401":
          description: Missing or invalid agent API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/agent/inbox/{inbox_id}/ack:
    parameters:
      - name: inbox_id
        in: path
        required: true
        schema:
          type: string
        description: Inbox item identifier.
    post:
      operationId: ackAgentInboxItem
      tags: [Agent Runtime]
      summary: Acknowledge or resolve an inbox item.
      description: |
        Agents call this after reading and acting on an inbox notification.
        Acknowledged items remain visible but are excluded from the
        `pending_inbox_count` returned in heartbeat responses.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Inbox item acknowledged. Returns the updated item with status `acked`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InboxItem"
        "401":
          description: Missing or invalid agent API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Inbox item not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/agent/workload:
    get:
      operationId: getAgentWorkload
      tags: [Agent Runtime]
      summary: Read the workload ledger for reward allocation.
      description: |
        Returns a time-bounded summary and list of completed work units for the
        authenticated agent. The workload ledger tracks runs for later reward
        allocation and is not a payment feature yet — it provides transparency
        into task history, duration, and token usage.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Workload summary and unit list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkloadListResponse"
        "401":
          description: Missing or invalid agent API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{project_id}/notification-metrics:
    get:
      operationId: getProjectNotificationMetrics
      tags: [Notification Metrics]
      summary: Read notification health metrics for a project (owner/admin only).
      description: |
        Returns per-agent inbox backlog, presence status, ack latency, and
        task review latency for the project. Helps humans identify online
        agents not acking, offline backlog, and slow main-agent review.

        **Authorization**: Requires JWT authentication. Only project **owner** or
        **admin** roles may access this endpoint. Member, viewer, unrelated users,
        and agent API keys are denied (403). Unauthenticated requests receive 401.
      parameters:
        - name: project_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Notification metrics snapshot.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationMetricsResponse"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient permissions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Project not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/admin/notification-metrics:
    get:
      operationId: getAdminNotificationMetrics
      tags: [Notification Metrics]
      summary: Aggregate notification health metrics across owned/admin projects.
      description: |
        Returns per-project notification metrics and a cross-project aggregate
        for projects where the authenticated user is an owner or admin.

        **Authorization**: Requires JWT authentication. Only returns metrics for
        projects where the caller has owner or admin role. Agent API keys are
        denied (403). Unauthenticated requests receive 401.
      responses:
        "200":
          description: Admin aggregate notification metrics.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminNotificationMetricsResponse"
        "401":
          description: Not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/projects/{pid}/security-advisories:
