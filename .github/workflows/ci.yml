name: CI

on:
  push:
    branches: [main, master, "release/*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      api_url:
        description: "Optional public API base URL for E2E (e.g. http://localhost:18080/agent)"
        required: false
        default: ""

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install backend dependencies
        run: cd backend && npm ci
      - name: Typecheck
        run: cd backend && npm run typecheck
      - name: Unit tests
        run: cd backend && npm run test:unit

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Dashboard JS syntax check (all dashboard/*.html)
        run: node scripts/check-dashboard-syntax.js dashboard

  sdk-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: SDK compileall + import
        run: |
          python3 -m compileall sdk/python/zz_agent
          pip install -e sdk/python/
          python3 -c "import zz_agent; print('zz_agent ok')"
      - name: CLI compileall + import
        run: |
          python3 -m compileall cli/zz_cli
          pip install -e cli/
          python3 -c "import zz_cli; print('zz_cli ok')"

  migration-dry-run:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: zz_ci
          POSTGRES_PASSWORD: zz_ci
          POSTGRES_DB: zz_ci
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install backend dependencies
        run: cd backend && npm ci
      - name: Build backend
        run: cd backend && npm run build
      - name: Compile migration import check
        run: cd backend && node scripts/ci-migration-check.js
      - name: Show pending migrations
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: zz_ci
          DB_PASSWORD: zz_ci
          DB_DATABASE: zz_ci
          DB_SYNCHRONIZE: false
        run: cd backend && npx typeorm migration:show -d dist/src/data-source.js
      - name: Run migrations
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USERNAME: zz_ci
          DB_PASSWORD: zz_ci
          DB_DATABASE: zz_ci
          DB_SYNCHRONIZE: false
        run: cd backend && npx typeorm migration:run -d dist/src/data-source.js

  e2e:
    runs-on: ubuntu-latest
    if: ${{ inputs.api_url != '' || vars.API_URL != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install backend dependencies
        run: cd backend && npm ci
      - name: Build backend
        run: cd backend && npm run build
      - name: API E2E
        env:
          NODE_ENV: test
          API_URL: ${{ inputs.api_url || vars.API_URL }}
        run: cd backend && node dist/tests/e2e-api.test.js

  golden-path-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install backend dependencies
        run: cd backend && npm ci
      - name: Build backend
        run: cd backend && npm run build
      - name: Start backend and wait for health
        env:
          NODE_ENV: test
          PORT: ${{ vars.SMOKE_PORT || '3000' }}
          INBOX_LEASE_TTL_MS: 2000
        run: |
          cd backend
          echo "BASE_URL=http://127.0.0.1:$PORT" >> "$GITHUB_ENV"
          echo "API_URL=http://127.0.0.1:$PORT" >> "$GITHUB_ENV"
          npm start &
          echo "SERVER_PID=$!" >> "$GITHUB_ENV"
          for i in {1..30}; do
            if response=$(curl -fsS "http://127.0.0.1:$PORT/v1/health"); then
              if printf '%s' "$response" | jq -e '.status == "healthy"' >/dev/null 2>&1; then
                echo "Backend healthy after ${i}s"
                exit 0
              fi
            fi
            sleep 1
          done
          echo "ERROR: backend failed to become healthy" >&2
          exit 1
      - name: Run Golden Path orchestration smoke
        env:
          RUN_LEASE_SMOKE: 1
          RUN_ORCHESTRATION_SMOKE: 1
        run: bash deploy/smoke.sh
      - name: Measure TTFT
        if: always()
        env:
          TTFT_THRESHOLD_MS: 300000
        run: bash deploy/measure-ttft.sh
      - name: API E2E
        if: always()
        env:
          NODE_ENV: test
        run: cd backend && node dist/tests/e2e-api.test.js
      - name: Stop backend
        if: always()
        run: kill "$SERVER_PID" 2>/dev/null || true
