services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: zz_agent
      POSTGRES_USER: zz_agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zz_agent -d zz_agent"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../..
      dockerfile: deploy/nas/backend.Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      # Set PLATFORM_HOST in .env (or let setup.sh auto-detect). Used for CORS
      # and generating public URLs. localhost works for single-machine use.
      PUBLIC_BASE_URL: http://${PLATFORM_HOST:-localhost}:18080/agent
      CORS_ORIGINS: http://${PLATFORM_HOST:-localhost}:18080,http://127.0.0.1:18080,http://localhost:18080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: zz_agent
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_DATABASE: zz_agent
      DB_SYNCHRONIZE: "false"
      INBOX_LEASE_ENABLED: "true"
      INBOX_LEASE_TTL_MS: ${INBOX_LEASE_TTL_MS:-300000}
      JWT_SECRET: ${JWT_SECRET}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET}
      LOG_LEVEL: info
      DEBUG_LOG_ENABLED: "true"
      LOG_DIR: /var/log/zz-agent
      PROJECT_GIT_DIR: /data/project-git
      DEBUG_LOG_FILE: /var/log/zz-agent/zz-agent-debug.jsonl
      DEBUG_LOG_MAX_BYTES: "20971520"
      DEBUG_LOG_MAX_FILES: "5"
      DEBUG_LOG_API_ENABLED: "true"
      DEBUG_LOG_API_TOKEN: ${DEBUG_LOG_API_TOKEN}
    volumes:
      # Logs + project-git repos. Defaults to ./data/ inside the repo (portable).
      # Override via .env: DEBUG_LOG_HOST_DIR=/your/path, PROJECT_GIT_HOST_DIR=/your/path
      - ${DEBUG_LOG_HOST_DIR:-./data/logs}:/var/log/zz-agent
      - ${PROJECT_GIT_HOST_DIR:-./data/project-git}:/data/project-git

  web:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "18080:80"
    volumes:
      - ../../dashboard:/usr/share/nginx/html/agent:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  # ── Gitea/Forgejo — optional external Git gateway (clone/push/PR/LFS) ──
  # Start with core only (default) or include Gitea: set INCLUDE_GITEA=1
  # To use: uncomment this block, or run `docker compose --profile gitea up`
  gitea:
    image: gitea/gitea:1.22
    profiles: ["gitea"]
    restart: unless-stopped
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      GITEA__server__DOMAIN: "${PLATFORM_HOST:-localhost}"
      GITEA__server__ROOT_URL: "http://${PLATFORM_HOST:-localhost}:23000/"
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__SSH_PORT: "22"
      GITEA__security__INSTALL_LOCK: "true"
    ports:
      - "23000:3000"
      - "22022:22"
    volumes:
      - ${GITEA_DATA_HOST_DIR:-./data/gitea}:/data

volumes:
  postgres-data:
