# Example nginx server block for https://www.zhuzeyang.xyz/agent.
# This assumes TLS is configured elsewhere, for example by certbot.

upstream zz_agent_backend {
    server 127.0.0.1:3000;
    keepalive 16;
}

server {
    listen 80;
    server_name www.zhuzeyang.xyz;

    # Static dashboard. Put dashboard assets here if/when published.
    location = /agent {
        return 301 /agent/;
    }

    location /agent/ {
        alias /var/www/zhuzeyang-agent/dashboard/;
        index index.html;
        try_files $uri $uri/ /agent/index.html;
    }

    # API and SSE endpoints. Express routes are rooted at /v1, so /agent
    # must be stripped before proxying.
    location /agent/v1/ {
        proxy_pass http://zz_agent_backend/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /agent;

        # Keep streaming responses responsive for /v1/sessions/:id/stream.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    # Swagger UI docs page.
    location = /agent/docs {
        return 301 /agent/docs/;
    }
    location /agent/docs/ {
        proxy_pass http://zz_agent_backend/api/docs/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /agent;
    }
    location /agent/api/openapi.json {
        proxy_pass http://zz_agent_backend/api/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Optional root deployment for API-only checks.
    location /v1/ {
        proxy_pass http://zz_agent_backend/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }
}
